<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- FIX MOBILE + CHỐNG ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kiểm Kho</title>

<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/400.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/500.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/600.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/700.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.1.0/800.css" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --primary-dark:#4f46e5;
  --primary-light:#a5b4fc;
  --accent:#f59e0b;
  --success:#10b981;
  --danger:#ef4444;
  --danger-soft:#fee2e2;
  --danger-text:#991b1b;
  --bg:#eef2f7;
  --card:#fff;
  --text:#1e293b;
  --text-secondary:#64748b;
  --border:#e2e8f0;
  --radius:14px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a78bfa 100%);
    color:#fff;
    padding:20px 16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    position:sticky;
    top:0;
    z-index:100;
    box-shadow:0 4px 20px rgba(99,102,241,0.3);
}

.header::before{
    content:'';
    position:absolute;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 60%);
    pointer-events:none;
}

.header-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:relative;
    z-index:1;
}

.header h2{
    font-size:20px;
    font-weight:800;
    letter-spacing:-0.5px;
}

#checkDate{
    padding:8px 14px;
    border-radius:10px;
    border:2px solid rgba(255,255,255,0.3);
    background:rgba(255,255,255,0.15);
    color:#fff;
    font-size:16px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    backdrop-filter:blur(4px);
    cursor:pointer;
}
#checkDate::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;}

.header-stats{
    display:flex;
    gap:8px;
    position:relative;
    z-index:1;
    font-size:12px;
    font-weight:600;
}

.stat-badge{
    padding:4px 10px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    gap:4px;
}

/* MAIN */
.main{
    padding:16px 10px 100px;
}

/* CARD */
.card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:0 4px 24px rgba(0,0,0,0.08);
    overflow:hidden;
    border:1px solid var(--border);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

thead{
    background:linear-gradient(135deg,#f8fafc,#f1f5f9);
    position:sticky;
    top:0;
}

th{
    padding:12px 8px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--text-secondary);
    border-bottom:2px solid var(--border);
    text-align:center;
}

th:nth-child(1){width:28%;}
th:nth-child(2){width:18%;}
th:nth-child(3){width:16%;}
th:nth-child(4){width:16%;}
th:nth-child(5){width:22%;}

td{
    padding:10px 6px;
    font-size:13px;
    text-align:center;
    border-bottom:1px solid #f1f5f9;
    word-break:break-word;
    transition:background 0.2s;
}

tr:hover td{
    background:#f8fafc;
}

.item-name{
    font-weight:600;
    color:var(--text);
    display:block;
}
.item-name.missing{
    color:var(--danger);
    position:relative;
    padding-left:8px;
}
.item-name.missing::before{
    content:'⚠️';
    position:absolute;
    left:-4px;
    font-size:11px;
}

/* INPUT */
.qty-input{
    width:100%;
    padding:10px 6px;
    font-size:16px;
    text-align:center;
    border-radius:10px;
    border:2px solid var(--border);
    background:#f8fafc;
    color:var(--text);
    font-weight:600;
    font-family:'Inter',sans-serif;
    transition:all 0.2s;
}
.qty-input:focus{
    outline:none;
    border-color:var(--primary);
    background:#fff;
    box-shadow:0 0 0 4px rgba(99,102,241,0.1);
}

/* DIFF */
.diff{
    font-weight:700;
    font-size:14px;
    padding:4px 10px;
    border-radius:8px;
    display:inline-block;
}
.diff.pos{background:#d1fae5;color:#065f46;}
.diff.neg{background:var(--danger-soft);color:var(--danger-text);}
.diff.zero{background:#f1f5f9;color:var(--text-secondary);}

/* VALUE CELL */
.val-cell{
    font-weight:600;
    color:var(--text);
}
.val-cell.outofstock{
    color:var(--danger);
    font-weight:700;
}

/* BUTTON */
.btn-save{
    position:fixed;
    bottom:20px;
    left:12px;
    right:12px;
    padding:16px;
    font-size:16px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:700;
    font-family:'Inter',sans-serif;
    letter-spacing:0.5px;
    box-shadow:0 8px 30px rgba(99,102,241,0.35);
    transition:all 0.3s;
    z-index:99;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}
.btn-save:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 40px rgba(99,102,241,0.45);
}
.btn-save:active{
    transform:translateY(0);
}

/* LOADING */
.loading{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}
.loading-box{
    background:#fff;
    padding:24px 36px;
    border-radius:16px;
    font-weight:600;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    text-align:center;
}
.spinner{
    width:40px;height:40px;
    border:4px solid var(--border);
    border-top-color:var(--primary);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* LEGEND */
.legend{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    padding:10px;
    font-size:11px;
    font-weight:600;
    color:var(--text-secondary);
    border-bottom:1px solid var(--border);
}
.legend span{
    display:flex;
    align-items:center;
    gap:4px;
}

/* EMPTY */
.empty{
    text-align:center;
    padding:48px 20px;
    color:var(--text-secondary);
}
.empty .icon{font-size:48px;margin-bottom:8px;opacity:0.5;}
.empty p{font-size:14px;}

/* MISSING ITEMS SUMMARY */
.missing-summary{
    background:linear-gradient(135deg,#fee2e2,#fecaca);
    padding:12px 14px;
    font-size:12px;
    font-weight:600;
    color:var(--danger-text);
    border-radius:0 0 var(--radius) var(--radius);
    display:none;
}
.missing-summary.active{
    display:block;
    border-top:1px solid #fca5a5;
}

/* ANIMATION */
.fade-in{animation:fadeIn 0.4s ease;}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
    <div class="header-top">
        <h2>📦 Kiểm Kho</h2>
        <input type="date" id="checkDate">
    </div>
    <div class="header-stats" id="headerStats">
        <span class="stat-badge" id="statTotal">📋 Tổng: -</span>
        <span class="stat-badge" id="statSaved">✅ Đã kiểm: -</span>
        <span class="stat-badge" id="statMissing">⚠️ Chưa kiểm: -</span>
    </div>
</div>

<div class="main">
    <div class="card">
            <div id="tableWrapper" class="fade-in">
            <div class="empty">
                <div class="icon">⏳</div>
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
        <div class="missing-summary" id="missingSummary"></div>
    </div>
</div>

<button class="btn-save" onclick="saveData()">💾 LƯU DỮ LIỆU</button>

<div class="loading" id="loading">
    <div class="loading-box">
        <div class="spinner"></div>
        <div>⏳ Đang lưu dữ liệu...</div>
    </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyFfyiJnc1G-Yb6qv3C0oqPQDLFccsgwwF2GmSyFCxvJUoTMAdpYFJDM2XF9N-cr_jf9A/exec';

let items = [];
let lastValues = {};
let rawValues = {};   // Lưu giá trị thô (bao gồm "hết hàng")
let checkedItems = {}; // Danh sách các mặt hàng đã kiểm hôm nay (true/false)

// ===== TIME VN =====
function getNowVN(){
    const now = new Date();
    const offset = now.getTimezoneOffset();
    return new Date(now.getTime() - offset*60000);
}

function getTodayVN(){
    return getNowVN().toISOString().split('T')[0];
}

function getTimeVN(){
    return getNowVN().toLocaleTimeString('vi-VN',{hour12:false});
}

// ===== INIT =====
function init(){
    const today = getTodayVN();
    const dateInput = document.getElementById('checkDate');

    dateInput.value = today;

    dateInput.addEventListener('change', function(){
        loadData(this.value);
    });

    // Fetch today's data first, then load selected date
    loadTodayData(today).then(()=>{
        loadData(today);
    });
}

// Load today's saved data to know which items have data
async function loadTodayData(date){
    try{
        const res = await fetch(API_URL,{
            method:'POST',
            body:JSON.stringify({action:'load',date:date})
        });
        const data = await res.json();
        if(data.success && data.revisions){
            data.revisions.forEach(r=>{
                Object.keys(r.items).forEach(k=>{
                    let v = r.items[k];
                    if(v !== "" && v !== null && v !== undefined){
                        // Ghi nhận là đã kiểm (kể cả khi là "hết hàng" / 0)
                        checkedItems[k] = true;
                        rawValues[k] = v;
                        // Chuyển "hết hàng" về 0 để tính toán
                        lastValues[k] = (v === "hết hàng") ? 0 : Number(v);
                    }
                });
            });
        }
    }catch(e){
        console.warn('Failed to load today data:', e);
    }
}

// ===== LOAD =====
function loadData(date){
    document.getElementById('tableWrapper').innerHTML = `
        <div class="empty">
            <div class="icon">⏳</div>
            <p>Đang tải dữ liệu...</p>
        </div>`;

    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({action:'load',date:date})
    })
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){
            document.getElementById('tableWrapper').innerHTML = `
                <div class="empty">
                    <div class="icon">❌</div>
                    <p>Lỗi API</p>
                </div>`;
            return;
        }

        items = data.headers || [];
        let revisions = data.revisions || [];

        // Reset cho ngày được chọn
        lastValues = {};
        rawValues = {};
        
        revisions.forEach(r=>{
            Object.keys(r.items).forEach(k=>{
                let v = r.items[k];
                if(v !== "" && v !== null && v !== undefined){
                    checkedItems[k] = true;
                    rawValues[k] = v;
                    lastValues[k] = (v === "hết hàng") ? 0 : Number(v);
                }
            });
        });

        renderTable();
        updateStats();
    })
    .catch(()=>{
        document.getElementById('tableWrapper').innerHTML = `
            <div class="empty">
                <div class="icon">❌</div>
                <p>Lỗi kết nối API</p>
            </div>`;
    });
}

// ===== RENDER =====
function renderTable(){
    if(items.length === 0){
        document.getElementById('tableWrapper').innerHTML = `
            <div class="empty">
                <div class="icon">⚠️</div>
                <p>Không có dữ liệu</p>
            </div>`;
        document.getElementById('missingSummary').classList.remove('active');
        return;
    }

    let missingItems = [];

    let html = `
    <table>
    <thead>
        <tr>
            <th>Mặt hàng</th>
            <th>SL kiểm</th>
            <th>Tồn theo ngày</th>
            <th>Tồn trên máy</th>
            <th>Thừa / Thiếu</th>
        </tr>
    </thead>
    <tbody>`;

    items.forEach(item=>{
        let sys = lastValues[item] !== undefined ? lastValues[item] : 0;
        
        // Kiểm tra mặt hàng đã có dữ liệu hôm nay chưa
        const hasData = checkedItems.hasOwnProperty(item) && checkedItems[item] === true;
        const isMissing = !hasData && Object.keys(checkedItems).length > 0;

        if(isMissing){
            missingItems.push(item);
        }

        // Hiển thị "hết hàng" nếu rawValue là "hết hàng"
        let displayVal = rawValues.hasOwnProperty(item) ? rawValues[item] : sys;

        html += `
        <tr>
            <td>
                <span class="item-name ${isMissing ? 'missing' : ''}">${item}</span>
            </td>

            <td>
                <input type="number"
                    class="qty-input"
                    data-item="${escapeAttr(item)}">
            </td>

            <td id="val-${escapeId(item)}" class="val-cell ${displayVal === 'hết hàng' ? 'outofstock' : ''}">${displayVal}</td>

            <td>
                <input type="number"
                    class="qty-input"
                    data-item="${escapeAttr(item)}"
                    oninput="calcDiff(this)">
            </td>

            <td id="diff-${escapeId(item)}" class="diff zero">0</td>
        </tr>`;
    });

    html += "</tbody></table>";

    document.getElementById('tableWrapper').innerHTML = html;

    // Show missing summary
    const missingEl = document.getElementById('missingSummary');
    if(missingItems.length > 0){
        missingEl.innerHTML = `⚠️ <strong>${missingItems.length}</strong> mặt hàng chưa kiểm hôm nay: ${missingItems.join(', ')}`;
        missingEl.classList.add('active');
    }else{
        missingEl.classList.remove('active');
    }
}

// ===== UPDATE STATS =====
function updateStats(){
    const total = items.length;
    let checkedCount = 0;
    let missingCount = 0;

    if(items.length > 0){
        items.forEach(item=>{
            if(checkedItems.hasOwnProperty(item) && checkedItems[item] === true){
                checkedCount++;
            }else{
                if(Object.keys(checkedItems).length > 0){
                    missingCount++;
                }
            }
        });
    }

    document.getElementById('statTotal').textContent = `📋 Tổng: ${total}`;
    document.getElementById('statSaved').textContent = `✅ Đã kiểm: ${checkedCount}`;
    document.getElementById('statMissing').textContent = `⚠️ Chưa kiểm: ${missingCount}`;
}

// ===== TÍNH =====
function calcDiff(input){
    const item = input.dataset.item;
    const machineVal = Number(input.value || 0);
    const sysVal = Number(lastValues[item] || 0);

    const diff = sysVal - machineVal;

    const el = document.getElementById("diff-"+escapeId(item));

    el.innerText = diff;

    el.classList.remove("pos","neg","zero");

    if(diff > 0){
        el.classList.add("pos");
    }else if(diff < 0){
        el.classList.add("neg");
    }else{
        el.classList.add("zero");
    }
}

// ===== SAVE =====
function saveData(){
    let entries = {};
    let hasAnyEntry = false;

    document.querySelectorAll('tbody tr').forEach(row=>{
        let input = row.children[1].querySelector('input');
        if(input && input.value !== ""){
            hasAnyEntry = true;
            // Nếu nhập 0 thì lưu "hết hàng"
            entries[input.dataset.item] = (input.value === "0" || input.value === 0) ? "hết hàng" : input.value;
        }
    });

    if(!hasAnyEntry){
        alert("⚠️ Chưa nhập số lượng nào!");
        return;
    }

    document.getElementById('loading').style.display = 'flex';

    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({
            action:'save',
            date:getTodayVN(),
            time:getTimeVN(),
            items:entries
        })
    })
    .then(r=>r.json())
    .then(data=>{
        document.getElementById('loading').style.display = 'none';

        if(!data.success){
            alert("❌ Lỗi ghi dữ liệu");
            return;
        }

        // Cập nhật local state
        Object.keys(entries).forEach(item=>{
            let val = entries[item];
            lastValues[item] = (val === "hết hàng") ? 0 : Number(val);
            rawValues[item] = val;
            checkedItems[item] = true; // Đánh dấu là đã kiểm
            let el = document.getElementById("val-"+escapeId(item));
            if(el){
                el.innerText = val;
                el.classList.toggle('outofstock', val === 'hết hàng');
            }
        });

        // Xóa input đã nhập
        document.querySelectorAll('tbody tr').forEach(row=>{
            row.children[1].querySelector('input').value="";
        });

        // Re-render to update red highlighting
        renderTable();
        updateStats();

        alert("✅ Đã ghi dữ liệu thành công!");
    })
    .catch(()=>{
        document.getElementById('loading').style.display = 'none';
        alert("❌ Lỗi kết nối");
    });
}

// ===== ESCAPE =====
function escapeId(str){
    return str.replace(/[^a-zA-Z0-9]/g,'_');
}
function escapeAttr(str){
    return str.replace(/"/g,'&quot;');
}

init();
</script>

</body>
</html>
