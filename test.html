<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiểm Kho Hàng Ngày</title>

<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/400.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f0f2f5;}
.header{background:#667eea;color:#fff;padding:16px;}
.main{padding:20px;}
table{width:100%;border-collapse:collapse;background:#fff;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #eee;}
.qty-input{width:70px;padding:5px;text-align:center;}
.btn{padding:6px 12px;margin:5px;cursor:pointer;}
.loading{padding:20px;text-align:center;color:#888;}
</style>
</head>

<body>

<div class="header">
<h2>📦 Kiểm Kho</h2>

<input type="date" id="checkDate">
<button class="btn" onclick="searchDate()">🔍 Tra cứu</button>

</div>

<div class="main">
<div id="tableWrapper" class="loading">⏳ Đang tải...</div>
<button class="btn" onclick="saveData()">💾 Ghi</button>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyFfyiJnc1G-Yb6qv3C0oqPQDLFccsgwwF2GmSyFCxvJUoTMAdpYFJDM2XF9N-cr_jf9A/exec';

let items = [];
let revisions = [];
let lastValues = {};

// ===== TIME VN =====
function getNowVN(){
    const now = new Date();
    const offset = now.getTimezoneOffset();
    return new Date(now.getTime() - offset*60000);
}
function getTodayVN(){
    return getNowVN().toISOString().split('T')[0];
}
function getTimeVN(){
    return getNowVN().toLocaleTimeString('vi-VN',{hour12:false});
}

// ===== INIT =====
function init(){
    const today = getTodayVN();
    document.getElementById('checkDate').value = today;
    loadData(today);
}

// ===== LOAD =====
function loadData(date){
    document.getElementById('tableWrapper').innerHTML = "⏳ Đang tải...";

    fetch(API_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'load',date:date})
    })
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){
            throw new Error(data.error || "API lỗi");
        }

        items = data.headers || [];
        revisions = data.revisions || [];

        // ===== LẤY GIÁ TRỊ CUỐI (QUAN TRỌNG) =====
        lastValues = {};
        if(revisions.length > 0){
            let last = revisions[revisions.length - 1]; // dòng cuối
            lastValues = last.items || {};
        }

        renderTable();
    })
    .catch(err=>{
        console.error(err);
        document.getElementById('tableWrapper').innerHTML =
            "<div class='loading'>❌ Lỗi tải dữ liệu</div>";
    });
}

// ===== TRA CỨU =====
function searchDate(){
    let date = document.getElementById('checkDate').value;
    if(!date){
        alert("Chọn ngày");
        return;
    }
    loadData(date);
}

// ===== RENDER =====
function renderTable(){
    if(items.length === 0){
        document.getElementById('tableWrapper').innerHTML =
            "<div class='loading'>Không có dữ liệu</div>";
        return;
    }

    let html = "<table><thead><tr><th>Mặt hàng</th><th>Số lượng</th><th>Nhập</th></tr></thead><tbody>";

    items.forEach(item=>{
        let val = lastValues[item] || "";

        html += `
        <tr>
            <td>${item}</td>
            <td id="val-${item}">${val || '-'}</td>
            <td><input type="number" class="qty-input" data-item="${item}"></td>
        </tr>`;
    });

    html += "</tbody></table>";
    document.getElementById('tableWrapper').innerHTML = html;
}

// ===== SAVE =====
function saveData(){
    let entries = {};

    document.querySelectorAll('.qty-input').forEach(i=>{
        if(i.value !== ""){
            entries[i.dataset.item] = i.value;
        }
    });

    if(Object.keys(entries).length === 0){
        alert("Chưa nhập");
        return;
    }

    fetch(API_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            action:'save',
            date:getTodayVN(),
            time:getTimeVN(),
            items:entries
        })
    })
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){
            throw new Error(data.error);
        }

        // update UI ngay
        Object.keys(entries).forEach(item=>{
            document.getElementById("val-"+item).innerText = entries[item];
        });

        document.querySelectorAll('.qty-input').forEach(i=>i.value="");

        alert("✅ Đã ghi!");
    })
    .catch(err=>{
        alert("❌ Lỗi ghi dữ liệu");
        console.error(err);
    });
}

init();
</script>

</body>
</html>
