<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kiểm Kho</title>
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/400.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    background:#eef2f7;
    padding-bottom:24px;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:#fff;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    box-shadow:0 4px 15px rgba(102,126,234,0.35);
    position:sticky;
    top:0;
    z-index:100;
}
.header h2{
    font-size:17px;
    white-space:nowrap;
}
.header input[type="date"]{
    padding:8px 12px;
    border-radius:10px;
    border:none;
    font-size:16px;
    background:rgba(255,255,255,0.2);
    color:#fff;
    backdrop-filter:blur(4px);
    font-family:'Inter',sans-serif;
}
.header input[type="date"]::-webkit-calendar-picker-indicator{
    filter:invert(1);
    cursor:pointer;
}

/* STATS BAR */
.stats-bar{
    display:flex;
    gap:8px;
    padding:12px 14px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}
.stat-card{
    flex:1;
    min-width:100px;
    background:#fff;
    border-radius:12px;
    padding:10px 12px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    transition:transform 0.2s;
}
.stat-card:active{transform:scale(0.97);}
.stat-num{
    font-size:22px;
    font-weight:700;
    line-height:1.2;
}
.stat-label{
    font-size:11px;
    color:#888;
    margin-top:2px;
}
.stat-total .stat-num{color:#667eea;}
.stat-checked .stat-num{color:#2e7d32;}
.stat-unchecked .stat-num{color:#e53935;}

/* MAIN */
.main{padding:0 10px;}

/* CARD */
.card{
    background:#fff;
    border-radius:14px;
    box-shadow:0 4px 20px rgba(0,0,0,0.07);
    overflow:hidden;
    margin-bottom:14px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}
thead{
    background:linear-gradient(180deg,#f7f9fc,#f0f3f8);
    position:sticky;
    top:0;
    z-index:10;
}
th,td{
    padding:9px 6px;
    font-size:12.5px;
    text-align:center;
    border-bottom:1px solid #eee;
}
th{
    font-weight:700;
    color:#555;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.3px;
}
td{word-break:break-word;vertical-align:middle;}
td:first-child{text-align:left;padding-left:10px;font-weight:500;}

/* ROW STATES */
.row-unchecked{
    background:rgba(255,226,226,0.7) !important;
    animation:rowPulse 2s ease-in-out infinite;
}
.row-unchecked td{border-bottom-color:#ffcdd2;}
.row-checked{background:#fff;}

@keyframes rowPulse{
    0%,100%{background:rgba(255,226,226,0.7);}
    50%{background:rgba(255,205,205,0.9);}
}

/* BADGE */
.badge-unchecked{
    display:inline-block;
    background:#e53935;
    color:#fff;
    font-size:10px;
    padding:2px 6px;
    border-radius:20px;
    margin-left:4px;
    font-weight:600;
    animation:badgeBlink 1.5s ease-in-out infinite;
}
@keyframes badgeBlink{
    0%,100%{opacity:1;}
    50%{opacity:0.6;}
}

/* INPUT */
.qty-input{
    width:100%;
    padding:8px 4px;
    font-size:16px;
    text-align:center;
    border-radius:8px;
    border:1.5px solid #e0e0e0;
    background:#fafafa;
    transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
    font-family:'Inter',sans-serif;
}
.qty-input:focus{
    border-color:#667eea;
    box-shadow:0 0 0 3px rgba(102,126,234,0.15);
    background:#fff;
    outline:none;
}
.qty-input.entered{
    border-color:#2e7d32;
    background:#e8f5e9;
    color:#2e7d32;
    font-weight:600;
}

/* DIFF */
.diff{font-weight:700;font-size:13px;}
.diff.pos{color:#2e7d32;}
.diff.neg{color:#c62828;}
.diff.zero{color:#78909c;}

/* UNCHECKED LIST */
.unchecked-section{
    background:#fff;
    border-radius:14px;
    box-shadow:0 4px 20px rgba(0,0,0,0.07);
    margin:0 10px 14px;
    overflow:hidden;
}
.unchecked-header{
    background:linear-gradient(135deg,#e53935,#ef5350);
    color:#fff;
    padding:12px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    user-select:none;
}
.unchecked-header h3{font-size:14px;font-weight:600;}
.unchecked-count{
    background:rgba(255,255,255,0.3);
    border-radius:20px;
    padding:3px 10px;
    font-size:12px;
    font-weight:600;
}
.unchecked-list{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
}
.unchecked-list.open{max-height:1000px;}
.unchecked-item{
    display:flex;
    align-items:center;
    padding:10px 16px;
    border-bottom:1px solid #fce4ec;
    gap:10px;
    transition:background 0.15s;
}
.unchecked-item:last-child{border-bottom:none;}
.unchecked-item:active{background:#fce4ec;}
.unchecked-icon{
    width:28px;height:28px;
    background:#ffcdd2;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    color:#e53935;
    font-size:14px;
}
.unchecked-name{font-size:13px;color:#333;flex:1;}

/* HIDDEN STATE */
.section-hidden{display:none !important;}

/* BUTTON */
.btn{
    width:calc(100% - 20px);
    margin:0 10px 16px;
    padding:14px;
    font-size:16px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    font-family:'Inter',sans-serif;
    box-shadow:0 4px 15px rgba(102,126,234,0.35);
    transition:transform 0.15s,box-shadow 0.15s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}
.btn:active{
    transform:scale(0.98);
    box-shadow:0 2px 8px rgba(102,126,234,0.3);
}
.btn:disabled{
    opacity:0.5;
    pointer-events:none;
}

/* LOADING */
.loading{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    backdrop-filter:blur(4px);
}
.loading-box{
    background:#fff;
    padding:24px 36px;
    border-radius:16px;
    font-weight:600;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);
    animation:popIn 0.3s ease;
}
@keyframes popIn{
    0%{transform:scale(0.8);opacity:0;}
    100%{transform:scale(1);opacity:1;}
}
.spinner{
    width:32px;height:32px;
    border:3px solid #e0e0e0;
    border-top-color:#667eea;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    background:#333;
    color:#fff;
    padding:12px 24px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    z-index:1000;
    transition:transform 0.3s ease;
    white-space:nowrap;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:linear-gradient(135deg,#43a047,#66bb6a);}
.toast.error{background:linear-gradient(135deg,#e53935,#ef5350);}

/* EMPTY */
.empty-state{
    text-align:center;
    padding:40px 20px;
    color:#999;
}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:14px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h2>📦 Kiểm Kho</h2>
    <input type="date" id="checkDate">
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
    <div class="stat-card stat-total">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Tổng mặt hàng</div>
    </div>
    <div class="stat-card stat-checked">
        <div class="stat-num" id="statChecked">0</div>
        <div class="stat-label">Đã kiểm</div>
    </div>
    <div class="stat-card stat-unchecked">
        <div class="stat-num" id="statUnchecked">0</div>
        <div class="stat-label">Chưa kiểm</div>
    </div>
</div>

<!-- TABLE -->
<div class="main">
    <div class="card">
        <div id="tableWrapper">
            <div class="empty-state">
                <div class="icon">⏳</div>
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>
</div>

<!-- UNCHECKED LIST -->
<div class="unchecked-section section-hidden" id="uncheckedSection">
    <div class="unchecked-header" onclick="toggleUncheckedList()">
        <h3>⚠️ Danh sách chưa kiểm</h3>
        <span class="unchecked-count" id="uncheckedCount">0</span>
    </div>
    <div class="unchecked-list" id="uncheckedList"></div>
</div>

<!-- SAVE BUTTON -->
<button class="btn" onclick="saveData()">
    <span>💾</span>
    <span>LƯU DỮ LIỆU</span>
</button>

<!-- LOADING -->
<div class="loading" id="loading">
    <div class="loading-box">
        <div class="spinner"></div>
        <div>Đang lưu dữ liệu...</div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyFfyiJnc1G-Yb6qv3C0oqPQDLFccsgwwF2GmSyFCxvJUoTMAdpYFJDM2XF9N-cr_jf9A/exec';

let invItems=[];
let lastValues={};
let checkedItems={};
let uncheckedListOpen=false;

// ===== TIME VN =====
function getNowVN(){
    const now=new Date();
    const offset=now.getTimezoneOffset();
    return new Date(now.getTime()-offset*60000);
}
function getTodayVN(){
    return getNowVN().toISOString().split('T')[0];
}
function getTimeVN(){
    return getNowVN().toLocaleTimeString('vi-VN',{hour12:false});
}

// ===== TOAST =====
function showToast(msg,type){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.className='toast '+type;
    setTimeout(()=>t.classList.add('show'),10);
    setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== TOGGLE UNCHECKED LIST =====
function toggleUncheckedList(){
    const el=document.getElementById('uncheckedList');
    uncheckedListOpen=!uncheckedListOpen;
    el.classList.toggle('open',uncheckedListOpen);
}

// ===== UPDATE STATS =====
function updateStats(){
    const total=invItems.length;
    const checkedCount=Object.keys(checkedItems).filter(k=>invItems.includes(k)).length;
    const uncheckedCount=total-checkedCount;

    document.getElementById('statTotal').textContent=total;
    document.getElementById('statChecked').textContent=checkedCount;
    document.getElementById('statUnchecked').textContent=uncheckedCount;

    const section=document.getElementById('uncheckedSection');
    const countEl=document.getElementById('uncheckedCount');
    countEl.textContent=uncheckedCount+' mục';

    if(checkedCount>0 && uncheckedCount>0){
        section.classList.remove('section-hidden');
    }else{
        section.classList.add('section-hidden');
    }
}

// ===== UPDATE UNCHECKED LIST =====
function renderUncheckedList(){
    const list=document.getElementById('uncheckedList');
    let html='';
    invItems.forEach(itemName=>{
        if(!checkedItems[itemName]){
            html+=`
            <div class="unchecked-item">
                <div class="unchecked-icon">✕</div>
                <div class="unchecked-name">${itemName}</div>
            </div>`;
        }
    });
    list.innerHTML=html;
}

// ===== HIGHLIGHT ROWS =====
function highlightRows(){
    const hasChecked=Object.keys(checkedItems).length>0;
    document.querySelectorAll('tbody tr').forEach(row=>{
        const input=row.children[1].querySelector('input');
        const itemName=input?input.dataset.item:'';
        row.classList.remove('row-checked','row-unchecked');
        if(hasChecked && !checkedItems[itemName]){
            row.classList.add('row-unchecked');
            const td=row.children[0];
            if(!td.querySelector('.badge-unchecked')){
                const badge=document.createElement('span');
                badge.className='badge-unchecked';
                badge.textContent='CHƯA KIỂM';
                td.appendChild(badge);
            }
        }else{
            const badge=td.querySelector('.badge-unchecked');
            if(badge) badge.remove();
        }
    });
}

// ===== INIT =====
function init(){
    const today=getTodayVN();
    const dateInput=document.getElementById('checkDate');
    dateInput.value=today;
    dateInput.addEventListener('change',function(){
        checkedItems={};
        loadData(this.value);
    });
    loadData(today);
}

// ===== LOAD =====
function loadData(date){
    document.getElementById('tableWrapper').innerHTML=`
        <div class="empty-state">
            <div class="icon">⏳</div>
            <p>Đang tải dữ liệu...</p>
        </div>`;

    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({action:'load',date:date})
    })
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){
            document.getElementById('tableWrapper').innerHTML=`
                <div class="empty-state">
                    <div class="icon">❌</div>
                    <p>Lỗi API</p>
                </div>`;
            return;
        }
        invItems=data.headers||[];
        let revisions=data.revisions||[];
        lastValues={};
        checkedItems={};
        revisions.forEach(r=>{
            Object.keys(r.items).forEach(k=>{
                let v=r.items[k];
                if(v!==""&&v!==null&&v!==undefined){
                    lastValues[k]=Number(v);
                    checkedItems[k]=true;
                }
            });
        });
        renderTable();
    })
    .catch(()=>{
        document.getElementById('tableWrapper').innerHTML=`
            <div class="empty-state">
                <div class="icon">❌</div>
                <p>Lỗi kết nối API</p>
            </div>`;
    });
}

// ===== RENDER =====
function renderTable(){
    if(invItems.length===0){
        document.getElementById('tableWrapper').innerHTML=`
            <div class="empty-state">
                <div class="icon">⚠️</div>
                <p>Không có dữ liệu</p>
            </div>`;
        updateStats();
        return;
    }

    let html=`
    <table>
    <thead>
        <tr>
            <th style="width:28%">Mặt hàng</th>
            <th style="width:16%">SL kiểm</th>
            <th style="width:18%">Tồn theo ngày</th>
            <th style="width:18%">Tồn trên máy</th>
            <th style="width:20%">Thừa / Thiếu</th>
        </tr>
    </thead>
    <tbody>`;

    invItems.forEach(item=>{
        let sys=lastValues[item]||0;
        let isAlreadyChecked=checkedItems[item]===true;
        let rowClass=isAlreadyChecked?'row-checked':'row-unchecked';
        let badgeHTML='';
        const hasAnyChecked=Object.keys(checkedItems).length>0;
        if(hasAnyChecked&&!isAlreadyChecked){
            badgeHTML=`<span class="badge-unchecked">CHƯA KIỂM</span>`;
        }

        html+=`
        <tr class="${rowClass}" data-item="${escapeAttr(item)}">
            <td>${item} ${badgeHTML}</td>
            <td>
                <input type="number"
                    class="qty-input${isAlreadyChecked?' entered':''}"
                    data-item="${escapeAttr(item)}"
                    value="${isAlreadyChecked?lastValues[item]:''}"
                    oninput="onQtyInput(this)">
            </td>
            <td id="val-${escapeId(item)}">${sys}</td>
            <td>
                <input type="number"
                    class="qty-input"
                    data-item="${escapeAttr(item)}"
                    oninput="calcDiff(this)">
            </td>
            <td id="diff-${escapeId(item)}" class="diff zero">${isAlreadyChecked?(sys-lastValues[item]):0}</td>
        </tr>`;
    });

    html+="</tbody></table>";
    document.getElementById('tableWrapper').innerHTML=html;

    updateStats();
    renderUncheckedList();
}

// ===== INPUT HANDLER =====
function onQtyInput(input){
    const item=input.dataset.item;
    if(input.value!==''&&!isNaN(Number(input.value))){
        checkedItems[item]=true;
        input.classList.add('entered');
    }else{
        delete checkedItems[item];
        input.classList.remove('entered');
    }
    highlightRows();
    updateStats();
    renderUncheckedList();
    calcDiff(input);
}

// ===== CALC DIFF =====
function calcDiff(input){
    const item=input.dataset.item;
    const machineVal=Number(input.value||0);
    const sysVal=Number(lastValues[item]||0);
    const diff=sysVal-machineVal;
    const el=document.getElementById("diff-"+escapeId(item));
    if(!el)return;
    el.innerText=diff;
    el.classList.remove("pos","neg","zero");
    if(diff>0)el.classList.add("pos");
    else if(diff<0)el.classList.add("neg");
    else el.classList.add("zero");
}

// ===== SAVE =====
function saveData(){
    let entries={};
    document.querySelectorAll('tbody tr').forEach(row=>{
        let input=row.children[1].querySelector('input');
        if(input&&input.value!==''){
            entries[input.dataset.item]=input.value;
        }
    });
    if(Object.keys(entries).length===0){
        showToast("⚠️ Chưa nhập mặt hàng nào","error");
        return;
    }
    document.getElementById('loading').style.display='flex';
    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({
            action:'save',
            date:getTodayVN(),
            time:getTimeVN(),
            items:entries
        })
    })
    .then(r=>r.json())
    .then(data=>{
        document.getElementById('loading').style.display='none';
        if(!data.success){
            showToast("❌ Lỗi ghi dữ liệu","error");
            return;
        }
        Object.keys(entries).forEach(item=>{
            lastValues[item]=Number(entries[item]);
            checkedItems[item]=true;
            let el=document.getElementById("val-"+escapeId(item));
            if(el)el.innerText=entries[item];
        });
        document.querySelectorAll('tbody tr').forEach(row=>{
            row.children[1].querySelector('input').value='';
        });
        document.querySelectorAll('.qty-input.entered').forEach(inp=>inp.classList.remove('entered'));
        highlightRows();
        updateStats();
        renderUncheckedList();
        document.querySelectorAll('tbody tr').forEach(row=>{
            row.classList.remove('row-unchecked');
            row.classList.add('row-checked');
        });
        showToast("✅ Đã ghi thành công!","success");
    })
    .catch(()=>{
        document.getElementById('loading').style.display='none';
        showToast("❌ Lỗi kết nối","error");
    });
}

// ===== ESCAPE =====
function escapeId(str){return str.replace(/[^a-zA-Z0-9]/g,'_');}
function escapeAttr(str){return str.replace(/"/g,'&quot;');}

init();
</script>
</body>
</html>
