<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">
  <title>Nhân viên Karaoke</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: url('background.jpg') no-repeat center center fixed; background-size: cover; margin:0; padding:10px; }
    
    /* Login Screen Styles */
    #loginScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .login-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      max-width: 350px;
      width: 90%;
      text-align: center;
    }
    .login-container h2 {
      color: #007bff;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .login-container input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
      text-align: center;
    }
    .login-container input:focus {
      outline: none;
      border-color: #007bff;
    }
    .login-container button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .login-container button:hover {
      background: #0056b3;
    }
    .login-error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
    
    /* Main App Styles */
    .container { max-width:480px; margin:auto; padding:15px; background: rgba(255,255,255,0.85); border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.2); display: none; }
    h1 { text-align:center; color:#007bff; font-size:22px; margin-bottom:10px; }
    #currentTime { text-align:center; font-weight:bold; margin:-5px 0 10px 0; color:#444; }
    .amount-input, .room-select { width:90%; font-size:18px; padding:6px; margin-bottom:8px; text-align:center; box-sizing:border-box; border:1px solid #ccc; border-radius:6px; background:#fff; font-weight:normal; color:#333; }
    .amount-input:disabled {
      background:#f0f0f0;
      color:#999;
      cursor:not-allowed;
      opacity:0.6;
    }
    .room-name-qr { font-size:18px; font-weight:bold; color:#007bff; margin-bottom:5px; text-align:center; min-height:22px; }
    .amount-text { font-size:14px; color:green; margin-bottom:8px; text-align:center; min-height:18px; }
    .qr-box { display:flex; justify-content:center; margin:10px 0; }
    .qr-box img { width:220px; height:220px; }
    .btn-camera { background:#ff6600; color:white; border:none; border-radius:6px; padding:8px 12px; cursor:pointer; margin:5px auto; display:block; }
    .btn-camera:disabled { background:#aaa; cursor:not-allowed; opacity:0.6; }
    table { width:100%; border-collapse: collapse; margin-top:12px; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    th, td { border:1px solid #ddd; padding:6px; text-align:center; font-size:14px; }
    th { background:#007bff; color:white; }
    .bg-unpaid { background:#f8f9fa; }
    .status-unpaid { color:red; font-weight:bold; }
    .status-paid { color:green; font-weight:bold; }
    .btn { padding:5px 8px; border:none; border-radius:4px; cursor:pointer; margin:2px; font-size:13px; }
    .btn-pay { background:#28a745; color:white; }
    .btn-qr { background:#007bff; color:white; }
    .btn:disabled { background:#aaa; cursor:not-allowed; }
    #cameraModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:1000; }
    .modal-content { position:relative; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    video { width:100%; height:100%; object-fit:cover; }
    canvas { display:none; position:absolute; top:0; left:0; width:100%; height:100%; }
    .modal-buttons { position:absolute; bottom:20px; display:flex; justify-content:center; width:100%; gap:10px; }
    .modal-buttons button { font-size:16px; padding:8px 12px; }
    .btn-save { background:#28a745; color:white; border:none; border-radius:6px; }
    .btn-close { background:#666; color:white; border:none; border-radius:6px; }

    .btn-worktime {
      display:block;
      width:100%;
      text-align:center;
      background:#007bff;
      color:white;
      font-size:18px;
      font-weight:bold;
      padding:10px 0;
      margin-top:15px;
      border:none;
      border-radius:8px;
      text-decoration:none;
      transition:0.2s;
    }
    .btn-worktime:hover { background:#0056b3; }

    .tab-nav {
      display:flex;
      margin-bottom:15px;
      border-radius:8px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    .tab-btn {
      flex:1;
      padding:12px 0;
      text-align:center;
      font-size:16px;
      font-weight:bold;
      background:#e0e0e0;
      color:#333;
      border:none;
      cursor:pointer;
      transition:0.2s;
    }
    .tab-btn.active { background:#007bff; color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    .advance-form label {
      display:block;
      font-weight:bold;
      color:#333;
      margin:10px 0 5px 5px;
      font-size:14px;
    }
    .no-room-hint {
      text-align:center;
      color:#999;
      font-size:13px;
      font-style:italic;
      margin:5px 0 10px 0;
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-container">
      <h2>🔐 Đăng nhập</h2>
      <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" />
      <button id="loginBtn">Đăng nhập</button>
      <div class="login-error" id="loginError">Mật khẩu không đúng!</div>
    </div>
  </div>

  <!-- Main Application -->
  <div class="container">
    <h1>QUÉT MÃ THANH TOÁN<br>KARAOKE RITA</h1>
    <p id="currentTime"></p>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="payment">💳 Thanh toán</button>
      <button class="tab-btn" data-tab="advance">💰 Tạm ứng</button>
    </div>

    <!-- Tab 1: Thanh toán -->
    <div id="tab-payment" class="tab-content active">
      <input id="manualAmount" class="amount-input" type="text" placeholder="Nhập số tiền" />
      <div class="room-name-qr" id="roomNameQR"></div>
      <div class="amount-text" id="amountText"></div>
      <div class="qr-box"><img id="qrImage" src="" alt="QR Thanh toán" /></div>
      <button id="openCamera" class="btn-camera">Chụp ảnh thanh toán</button>

      <table>
        <thead>
          <tr>
            <th>Phòng</th>
            <th>Số tiền</th>
            <th>Trạng thái</th>
            <th>Thời gian</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="roomTable"></tbody>
      </table>

      <a href="https://karaokerita.github.io/checkout/" class="btn-worktime" target="_blank">🕒 Tính giờ đi làm</a>
    </div>

    <!-- Tab 2: Tạm ứng -->
    <div id="tab-advance" class="tab-content">
      <div class="advance-form">
        <label for="advanceRoom">🏠 Chọn phòng tạm ứng</label>
        <select id="advanceRoom" class="room-select">
          <option value="">-- Đang tải danh sách phòng --</option>
        </select>
        <div class="no-room-hint" id="noRoomHint" style="display:none;">
          Hiện không có phòng nào đang mở!
        </div>

        <label for="advanceAmount">💵 Số tiền tạm ứng</label>
        <input id="advanceAmount" class="amount-input" type="text" placeholder="Vui lòng chọn phòng tạm ứng trước" disabled />

        <div class="qr-box"><img id="advanceQrImage" src="" alt="QR Tạm ứng" /></div>
        <div class="amount-text" id="advanceAmountText"></div>
        <button id="openCameraAdvance" class="btn-camera" disabled>Chụp ảnh tạm ứng</button>
      </div>
    </div>
  </div>

  <!-- Modal Camera -->
  <div id="cameraModal">
    <div class="modal-content">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="modal-buttons">
        <button id="captureBtn" class="btn-camera">Chụp</button>
        <button id="downloadBtn" class="btn-save" style="display:none;">Chia sẻ / Lưu ảnh</button>
        <button id="closeModal" class="btn-close">Đóng</button>
      </div>
    </div>
  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyikI5jLJDeLWFEMRk6UVfW2ERp679iA2HkoSG2z_q7aT7SUY2axsFk5e1mUd_Q31Bf/exec";

// ===== Login Logic =====
const DEFAULT_PASSWORD = "6868";
const loginScreen = document.getElementById("loginScreen");
const loginPassword = document.getElementById("loginPassword");
const loginBtn = document.getElementById("loginBtn");
const loginError = document.getElementById("loginError");
const mainContainer = document.querySelector(".container");

function handleLogin() {
  const password = loginPassword.value;
  if (password === DEFAULT_PASSWORD) {
    loginScreen.style.display = "none";
    mainContainer.style.display = "block";
    loginError.style.display = "none";
  } else {
    loginError.style.display = "block";
    loginPassword.value = "";
    loginPassword.focus();
  }
}

loginBtn.addEventListener("click", handleLogin);
loginPassword.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    handleLogin();
  }
});

// Focus on password input when page loads
loginPassword.focus();

// ===== Tab switching =====
const tabBtns = document.querySelectorAll(".tab-btn");
const tabContents = document.querySelectorAll(".tab-content");
tabBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const target = btn.dataset.tab;
    tabBtns.forEach(b => b.classList.remove("active"));
    tabContents.forEach(c => c.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + target).classList.add("active");
  });
});

// ===== Common elements =====
const manualAmount = document.getElementById("manualAmount");
const qrImage = document.getElementById("qrImage");
const amountText = document.getElementById("amountText");
const roomNameQR = document.getElementById("roomNameQR");
const openCamera = document.getElementById("openCamera");
const cameraModal = document.getElementById("cameraModal");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const captureBtn = document.getElementById("captureBtn");
const downloadBtn = document.getElementById("downloadBtn");
const closeModal = document.getElementById("closeModal");

// Advance elements
const advanceAmount = document.getElementById("advanceAmount");
const advanceRoom = document.getElementById("advanceRoom");
const advanceQrImage = document.getElementById("advanceQrImage");
const advanceAmountText = document.getElementById("advanceAmountText");
const openCameraAdvance = document.getElementById("openCameraAdvance");
const noRoomHint = document.getElementById("noRoomHint");

let stream;
let currentMode = "payment";
let currentShareText = "";
let unpaidRoomsCache = [];

// Hiển thị đồng hồ
function updateClock() {
  const now = new Date();
  const days = ["Chủ Nhật","Thứ Hai","Thứ Ba","Thứ Tư","Thứ Năm","Thứ Sáu","Thứ Bảy"];
  const time = now.toLocaleTimeString("vi-VN",{hour12:false});
  const date = now.toLocaleDateString("vi-VN");
  document.getElementById("currentTime").innerText = `${time} - ${days[now.getDay()]}, ${date}`;
}
setInterval(updateClock,1000);
updateClock();

// Chuyển số thành chữ
function readTriple(num){
  const units=["","một","hai","ba","bốn","năm","sáu","bảy","tám","chín"];
  let [h,t,o]=String(num).padStart(3,'0').split("").map(Number);
  let s="";
  if(h>0){ s+=units[h]+" trăm"; if(t===0&&o>0)s+=" linh"; }
  if(t>1){ s+=" "+units[t]+" mươi"; if(o===1)s+=" mốt"; else if(o===5)s+=" lăm"; else if(o>0)s+=" "+units[o]; }
  else if(t===1){ s+=" mười"; if(o===1)s+=" một"; else if(o===5)s+=" lăm"; else if(o>0)s+=" "+units[o]; }
  else if(t===0&&o>0&&h===0){ s+=units[o]; }
  else if(o>0){ s+=" "+units[o]; }
  return s.trim();
}
function numberToWords(n){
  if(!n||n===0) return "không đồng";
  const scales=["","nghìn","triệu","tỷ"];
  let parts=[], scaleIdx=0;
  while(n>0){
    let chunk=n%1000;
    if(chunk>0){
      let words=readTriple(chunk);
      if(scales[scaleIdx]) words+=" "+scales[scaleIdx];
      parts.unshift(words);
    }
    n=Math.floor(n/1000);
    scaleIdx++;
  }
  return parts.join(", ").replace(/ ,/g,",").replace(/\s+/g," ").trim()+" đồng";
}
function formatNumber(num){ return Number(num).toLocaleString("vi-VN"); }

// ===== QR cho Thanh toán phòng =====
function updateQR(val, roomName=""){
  if(roomName) roomNameQR.textContent = roomName;
  const displayRoom = roomNameQR.textContent || "";
  const addInfo = displayRoom ? `Thank+You+${encodeURIComponent(displayRoom)}` : `Thank+You`;
  const url=`https://img.vietqr.io/image/VCB-9917523946-qr_only.png?amount=${val}&addInfo=${addInfo}&accountName=HUYNH+PHUONG+TRANG`;
  qrImage.src=url;
  amountText.textContent = numberToWords(Number(val));
}
manualAmount.addEventListener("input", function(){
  let val=this.value.replace(/\D/g,"");
  if(val){
    this.value=formatNumber(val);
    updateQR(val);
  } else {
    this.value="";
    amountText.textContent="";
    qrImage.src="";
  }
});

// ===== Cập nhật QR tạm ứng (nội dung: "tam ung + tên phòng") =====
function refreshAdvanceQR(){
  const roomName = advanceRoom.value.trim();
  const amountRaw = advanceAmount.value.replace(/\D/g,"");

  if(amountRaw){
    const addInfoRaw = roomName ? `tam ung ${roomName}` : `tam ung`;
    const addInfo = encodeURIComponent(addInfoRaw);
    const url = `https://img.vietqr.io/image/VCB-9917523946-qr_only.png?amount=${amountRaw}&addInfo=${addInfo}&accountName=HUYNH+PHUONG+TRANG`;
    advanceQrImage.src = url;
    advanceAmountText.textContent = numberToWords(Number(amountRaw));
  } else {
    advanceQrImage.src = "";
    advanceAmountText.textContent = "";
  }
}

advanceAmount.addEventListener("input", function(){
  let val = this.value.replace(/\D/g,"");
  if(val){
    this.value = formatNumber(val);
  } else {
    this.value = "";
  }
  refreshAdvanceQR();
});

// ===== Cập nhật trạng thái ô nhập tiền tạm ứng theo phòng đã chọn =====
function updateAdvanceAmountState(){
  const hasRoom = advanceRoom.value.trim() !== "";
  if(hasRoom){
    advanceAmount.disabled = false;
    advanceAmount.placeholder = "Nhập số tiền";
    openCameraAdvance.disabled = false;
  } else {
    advanceAmount.disabled = true;
    advanceAmount.value = "";
    advanceAmount.placeholder = "Vui lòng chọn phòng tạm ứng trước";
    openCameraAdvance.disabled = true;
    advanceQrImage.src = "";
    advanceAmountText.textContent = "";
  }
}

advanceRoom.addEventListener("change", function(){
  updateAdvanceAmountState();
  refreshAdvanceQR();
});

// Khởi tạo trạng thái ban đầu cho ô tạm ứng
updateAdvanceAmountState();

// ===== Populate dropdown phòng chưa thanh toán =====
function populateAdvanceRoomSelect(data){
  const unpaid = data.filter(r => r.status === "Chưa thanh toán");
  unpaidRoomsCache = unpaid;

  const prevValue = advanceRoom.value;

  advanceRoom.innerHTML = "";

  if(unpaid.length === 0){
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "-- Không có phòng đang mở --";
    advanceRoom.appendChild(opt);
    noRoomHint.style.display = "block";
    updateAdvanceAmountState();
    return;
  }

  noRoomHint.style.display = "none";

  const defaultOpt = document.createElement("option");
  defaultOpt.value = "";
  defaultOpt.textContent = "-- Chọn phòng tạm ứng --";
  advanceRoom.appendChild(defaultOpt);

  unpaid.forEach(room => {
    const opt = document.createElement("option");
    opt.value = room.name;
    opt.textContent = room.name;
    advanceRoom.appendChild(opt);
  });

  if(prevValue && unpaid.some(r => r.name === prevValue)){
    advanceRoom.value = prevValue;
  }

  updateAdvanceAmountState();
}

// Load danh sách phòng
async function loadRooms(){
  manualAmount.value="";
  qrImage.src="";
  amountText.textContent="";
  roomNameQR.textContent="";
  try {
    const res = await fetch(API+"?action=getRooms");
    const data = await res.json();
    const table = document.getElementById("roomTable");
    table.innerHTML = "";
    data.sort((a,b)=> (a.status==="Chưa thanh toán"?0:1) - (b.status==="Chưa thanh toán"?0:1));
    data.forEach(room=>{
      const tr=document.createElement("tr");
      if(room.status==="Chưa thanh toán") tr.classList.add("bg-unpaid");
      tr.innerHTML=`
        <td>${room.name}</td>
        <td>${formatNumber(room.amount)}</td>
        <td class="${room.status==='Đã thanh toán'?'status-paid':'status-unpaid'}">${room.status}</td>
        <td>${room.refTime || ''}</td>
        <td>
          <button class="btn btn-pay" ${room.status==='Đã thanh toán'?'disabled':''} onclick="markPaid('${room.name}')">Thanh toán</button>
          <button class="btn btn-qr" onclick="fillQR('${room.amount}','${room.name}')">Lấy QR</button>
        </td>`;
      table.appendChild(tr);
    });

    populateAdvanceRoomSelect(data);
  } catch(e){
    console.error("Lỗi tải phòng:", e);
  }
}
async function markPaid(roomName){
  await fetch(`${API}?action=markPaid&room=${encodeURIComponent(roomName)}`);
  loadRooms();
}
function fillQR(amount, roomName){
  manualAmount.value=formatNumber(amount);
  updateQR(amount, roomName);
}
loadRooms();
setInterval(loadRooms, 180000);

// ===== Camera =====
function openCameraModal(mode){
  currentMode = mode;
  cameraModal.style.display = "flex";
  canvas.style.display = "none";
  downloadBtn.style.display = "none";
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } }, audio:false })
    .then(s => { stream = s; video.srcObject = stream; })
    .catch(() => navigator.mediaDevices.getUserMedia({ video:true, audio:false })
      .then(s => { stream = s; video.srcObject = stream; }));
}

openCamera.addEventListener("click", () => openCameraModal("payment"));
openCameraAdvance.addEventListener("click", () => {
  if(!advanceRoom.value.trim()){
    alert("Vui lòng chọn phòng tạm ứng trước khi chụp ảnh!");
    return;
  }
  openCameraModal("advance");
});

captureBtn.addEventListener("click", () => {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const timeStr = new Date().toLocaleString('vi-VN');

  if(currentMode === "payment"){
    const roomName = roomNameQR.textContent || " ";
    const amountNumber = manualAmount.value || "0";
    currentShareText = `${roomName}\nSố tiền: ${amountNumber}\nThời gian: ${timeStr}`;

    function drawLabel(text, x, y) {
      ctx.font = "20px Arial";
      ctx.textBaseline = "top";
      const padding = 10;
      const textWidth = ctx.measureText(text).width;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x - padding/2, y - padding/2, textWidth + padding, 28);
      ctx.fillStyle = "lightgreen";
      ctx.fillText(text, x, y);
    }
    drawLabel(`${roomName}`, 20, 20);
    drawLabel(`Số tiền: ${amountNumber}`, 20, 55);
    drawLabel(`Thời gian: ${timeStr}`, 20, 90);
  } else {
    const roomName = advanceRoom.value.trim() || "Tạm ứng";
    const amountNumber = advanceAmount.value || "0";
    currentShareText = `tam ung ${roomName}\nSố tiền: ${amountNumber}\nThời gian: ${timeStr}`;

    function drawLabelAdv(text, x, y) {
      ctx.font = "20px Arial";
      ctx.textBaseline = "top";
      const padding = 10;
      const textWidth = ctx.measureText(text).width;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(x - padding/2, y - padding/2, textWidth + padding, 28);
      ctx.fillStyle = "#ffeb3b";
      ctx.fillText(text, x, y);
    }
    drawLabelAdv(`Tạm ứng: ${roomName}`, 20, 20);
    drawLabelAdv(`Số tiền: ${amountNumber}`, 20, 55);
    drawLabelAdv(`Thời gian: ${timeStr}`, 20, 90);
  }

  canvas.style.display = "block";
  downloadBtn.style.display = "inline-block";
});

downloadBtn.addEventListener("click", async () => {
  canvas.toBlob(async (blob) => {
    const prefix = currentMode === "payment" ? "ThanhToan" : "TamUng";
    const file = new File([blob], `${prefix}_${Date.now()}.png`, { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: currentMode === "payment" ? "Ảnh thanh toán" : "Ảnh tạm ứng",
        text: currentShareText
      });
    } else {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${prefix}_${Date.now()}.png`;
      link.click();
    }
  }, "image/png");
});

closeModal.addEventListener("click", () => {
  cameraModal.style.display = "none";
  if(stream){ stream.getTracks().forEach(track => track.stop()); }
});
</script>
</body>
</html>
