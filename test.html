<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiểm Kho</title>

<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/400.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f0f2f5;}
.header{background:#667eea;color:#fff;padding:16px;}
.main{padding:20px;}
table{width:100%;border-collapse:collapse;background:#fff;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #eee;}
.qty-input{width:80px;padding:6px;text-align:center;}
.diff{font-weight:600;}
.diff.pos{color:#2e7d32;}
.diff.neg{color:#c62828;}
.diff.zero{color:#555;}
.btn{padding:6px 12px;margin:5px;cursor:pointer;}
.btn-save{background:#43a047;color:#fff;}
</style>
</head>

<body>

<div class="header">
<h2>📦 Kiểm Kho</h2>

<input type="date" id="checkDate">
<button class="btn" onclick="searchDate()">🔍 Tra cứu</button>
<button class="btn btn-save" onclick="saveData()">💾 Ghi dữ liệu</button>

</div>

<div class="main">
<div id="tableWrapper">⏳ Đang tải...</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyFfyiJnc1G-Yb6qv3C0oqPQDLFccsgwwF2GmSyFCxvJUoTMAdpYFJDM2XF9N-cr_jf9A/exec';

let items = [];
let lastValues = {};

// ===== TIME VN =====
function getNowVN(){
    const now = new Date();
    const offset = now.getTimezoneOffset();
    return new Date(now.getTime() - offset*60000);
}

function getTodayVN(){
    return getNowVN().toISOString().split('T')[0];
}

function getTimeVN(){
    return getNowVN().toLocaleTimeString('vi-VN',{hour12:false});
}

// ===== INIT =====
function init(){
    const today = getTodayVN();
    document.getElementById('checkDate').value = today;
    loadData(today);
}

// ===== LOAD =====
function loadData(date){
    document.getElementById('tableWrapper').innerHTML = "⏳ Đang tải...";

    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({action:'load',date:date})
    })
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){
            document.getElementById('tableWrapper').innerHTML = "❌ Lỗi API";
            return;
        }

        items = data.headers || [];
        let revisions = data.revisions || [];

        // 👉 LẤY GIÁ TRỊ CUỐI
        lastValues = {};
        revisions.forEach(r=>{
            Object.keys(r.items).forEach(k=>{
                let v = r.items[k];
                if(v !== "" && v !== null && v !== undefined){
                    lastValues[k] = Number(v);
                }
            });
        });

        renderTable();
    })
    .catch(()=>{
        document.getElementById('tableWrapper').innerHTML = "❌ Lỗi kết nối API";
    });
}

// ===== SEARCH =====
function searchDate(){
    let date = document.getElementById('checkDate').value;
    loadData(date);
}

// ===== RENDER =====
function renderTable(){
    if(items.length === 0){
        document.getElementById('tableWrapper').innerHTML = "⚠️ Không có dữ liệu";
        return;
    }

    let html = `
    <table>
    <thead>
        <tr>
            <th>Mặt hàng</th>
            <th>Tồn hệ thống</th>
            <th>Tồn trên máy</th>
            <th>Thừa / Thiếu</th>
        </tr>
    </thead>
    <tbody>
    `;

    items.forEach(item=>{
        let sys = lastValues[item] || 0;

        html += `
        <tr>
            <td>${item}</td>
            <td id="sys-${escapeId(item)}">${sys}</td>

            <td>
                <input type="number"
                    class="qty-input"
                    data-item="${escapeAttr(item)}"
                    oninput="calcDiff(this)">
            </td>

            <td id="diff-${escapeId(item)}" class="diff zero">0</td>
        </tr>`;
    });

    html += "</tbody></table>";

    document.getElementById('tableWrapper').innerHTML = html;
}

// ===== TÍNH THỪA / THIẾU =====
function calcDiff(input){
    const item = input.dataset.item;
    const machineVal = Number(input.value || 0);
    const sysVal = Number(lastValues[item] || 0);

    const diff = sysVal - machineVal;

    const el = document.getElementById("diff-"+escapeId(item));

    el.innerText = diff;

    el.classList.remove("pos","neg","zero");

    if(diff > 0){
        el.classList.add("pos");
    }else if(diff < 0){
        el.classList.add("neg");
    }else{
        el.classList.add("zero");
    }
}

// ===== SAVE (CHỈ GHI TỒN HỆ THỐNG) =====
function saveData(){

    if(items.length === 0){
        alert("Không có dữ liệu để ghi");
        return;
    }

    let entries = {};

    // 👉 CHỈ LẤY CỘT TỒN HỆ THỐNG
    items.forEach(item=>{
        let val = lastValues[item];
        if(val !== undefined){
            entries[item] = val;
        }
    });

    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({
            action:'save',
            date:getTodayVN(),   // luôn ngày hiện tại
            time:getTimeVN(),
            items:entries
        })
    })
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){
            alert("❌ Lỗi ghi dữ liệu");
            return;
        }

        alert("✅ Đã ghi tồn hệ thống!");
    })
    .catch(()=>{
        alert("❌ Lỗi kết nối API");
    });
}

// ===== ESCAPE =====
function escapeId(str){
    return str.replace(/[^a-zA-Z0-9]/g,'_');
}

function escapeAttr(str){
    return str.replace(/"/g,'&quot;');
}

// ===== RUN =====
init();
</script>

</body>
</html>
