<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karaoke Order & Payment System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 50; display: flex; justify-content: center; align-items: center; }
    .hidden { display: none; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <!-- Loading Overlay -->
  <div id="loading" class="loading-overlay hidden">
    <div class="text-center">
      <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-2"></i>
      <p class="text-gray-600 font-semibold">Đang xử lý...</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto p-4">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-lg shadow">
      <h1 class="text-2xl font-bold text-indigo-700 mb-2 md:mb-0"><i class="fas fa-music mr-2"></i>Quản lý Karaoke</h1>
      <div class="flex items-center gap-4">
        <span id="syncStatus" class="text-sm text-gray-500"><i class="fas fa-sync fa-spin mr-1"></i>Đang đồng bộ...</span>
        <button onclick="manualSync()" class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded text-sm transition"><i class="fas fa-sync-alt"></i> Sync ngay</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- CỘT TRÁI: Danh sách phòng -->
      <div class="lg:col-span-1 bg-white p-4 rounded-lg shadow">
        <h2 class="text-lg font-semibold mb-4 border-b pb-2">Danh sách phòng</h2>
        <div id="roomList" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2">
          <div class="text-center text-gray-500 py-4">Đang tải phòng...</div>
        </div>
      </div>

      <!-- CỘT GIỮA: Order Món -->
      <div class="lg:col-span-1 bg-white p-4 rounded-lg shadow flex flex-col">
        <h2 class="text-lg font-semibold mb-4 border-b pb-2 flex justify-between items-center">
          <span>Menu Order</span>
          <span id="selectedRoomName" class="text-indigo-600 font-bold">Chưa chọn phòng</span>
        </h2>
        
        <div id="menuList" class="flex-1 overflow-y-auto space-y-2 mb-4 max-h-[50vh] pr-2">
          <div class="text-center text-gray-500 py-4">Đang tải menu...</div>
        </div>

        <div class="border-t pt-4 bg-gray-50 p-3 rounded-lg">
          <h3 class="font-semibold mb-2 text-sm text-gray-700">Thao tác nhanh</h3>
          <div class="grid grid-cols-2 gap-2">
            <input type="number" id="orderQty" value="1" min="1" class="border p-2 rounded w-full focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Số lượng">
            <button onclick="submitOrder(1)" class="bg-green-600 text-white p-2 rounded hover:bg-green-700 transition font-medium"><i class="fas fa-plus"></i> Thêm món</button>
            <button onclick="submitOrder(-1)" class="bg-red-500 text-white p-2 rounded hover:bg-red-600 col-span-2 transition font-medium"><i class="fas fa-minus"></i> Trả đồ (Trừ số lượng)</button>
          </div>
        </div>
      </div>

      <!-- CỘT PHẢI: Thanh toán -->
      <div class="lg:col-span-1 bg-white p-4 rounded-lg shadow flex flex-col">
        <h2 class="text-lg font-semibold mb-4 border-b pb-2">Chi tiết Thanh toán</h2>
        
        <div id="billDetails" class="flex-1 overflow-y-auto max-h-[60vh] pr-2">
          <div class="text-center text-gray-500 py-4">Chọn phòng để xem bill</div>
        </div>

        <div class="border-t pt-4 mt-4 bg-gray-50 p-4 rounded-lg">
          <div class="flex justify-between text-xl font-bold mb-4">
            <span>Tổng cộng:</span>
            <span id="totalAmount" class="text-red-600">0 đ</span>
          </div>
          <button id="btnPay" onclick="payCurrentRoom()" disabled class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed transition shadow-lg">
            <i class="fas fa-cash-register mr-2"></i>Thanh toán phòng
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // === CẤU HÌNH LINK WEB APP ===
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz7mwoQxJflAdQBGlfk3CrNAf5Hlge--nmmeOi7fCtkxbBDeZ54vs_YTAKTclprRlw/exec";

    let currentRoom = null;
    let menuData = [];
    let roomsData = [];
    let currentSelectedItem = null;

    // --- HÀM GỌI API (FETCH) ---
    async function callGAS(action, payload = {}) {
      showLoading(true);
      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ action: action, data: payload })
        });
        const result = await response.json();
        return result;
      } catch (error) {
        console.error("Lỗi kết nối:", error);
        alert("Lỗi kết nối đến máy chủ. Vui lòng kiểm tra mạng hoặc link Web App.");
        return { success: false, message: "Lỗi kết nối" };
      } finally {
        showLoading(false);
      }
    }

    function showLoading(show) {
      const el = document.getElementById('loading');
      if (show) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }

    // --- KHỞI TẠO ---
    window.onload = function() {
      loadData();
      // Tự động kiểm tra trạng thái phòng mỗi 60 giây
      setInterval(() => {
        checkRoomStatusAuto();
      }, 60000);
    };

    async function loadData() {
      document.getElementById('syncStatus').innerHTML = '<i class="fas fa-sync fa-spin mr-1"></i>Đang tải...';
      
      const roomsRes = await callGAS('getRooms');
      if (roomsRes) {
        roomsData = roomsRes;
        renderRooms();
      }

      const menuRes = await callGAS('getMenu');
      if (menuRes) {
        menuData = menuRes;
        renderMenu();
      }
      
      document.getElementById('syncStatus').innerHTML = '<i class="fas fa-check-circle text-green-500"></i>Đồng bộ xong';
    }

    // --- RENDER GIAO DIỆN ---
    function renderRooms() {
      const container = document.getElementById('roomList');
      container.innerHTML = '';
      
      roomsData.forEach(room => {
        const isPaid = room.trangThai === 'Đã thanh toán';
        const div = document.createElement('div');
        div.className = `room-card p-3 rounded-lg border cursor-pointer flex justify-between items-center transition ${currentRoom === room.phong ? 'border-indigo-500 bg-indigo-50 ring-1 ring-indigo-500' : 'border-gray-200 hover:bg-gray-50'}`;
        div.onclick = () => selectRoom(room.phong);
        div.innerHTML = `
          <div>
            <div class="font-bold text-lg">${room.phong}</div>
            <div class="text-xs text-gray-500">Cập nhật: ${room.reftime ? new Date(room.reftime).toLocaleTimeString() : 'N/A'}</div>
          </div>
          <span class="px-2 py-1 rounded text-xs font-bold ${isPaid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
            ${room.trangThai}
          </span>
        `;
        container.appendChild(div);
      });
    }

    function renderMenu() {
      const container = document.getElementById('menuList');
      container.innerHTML = '';
      
      menuData.forEach(item => {
        const div = document.createElement('div');
        const isSelected = currentSelectedItem && currentSelectedItem.id === item.id;
        div.className = `flex justify-between items-center p-3 border rounded cursor-pointer transition ${isSelected ? 'bg-indigo-100 border-indigo-500' : 'hover:bg-gray-50'}`;
        div.onclick = () => {
          currentSelectedItem = item;
          renderMenu(); // Re-render để highlight
          document.getElementById('orderQty').focus();
        };
        div.innerHTML = `
          <span class="font-medium">${item.tenHang}</span>
          <span class="text-red-600 font-semibold">${Number(item.gia).toLocaleString()}đ</span>
        `;
        container.appendChild(div);
      });
    }

    function renderBill(billData) {
      const container = document.getElementById('billDetails');
      container.innerHTML = '';
      let total = 0;

      if (!billData || billData.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 py-4">Chưa có order nào</div>';
        document.getElementById('totalAmount').innerText = '0 đ';
        document.getElementById('btnPay').disabled = true;
        return;
      }

      billData.forEach(item => {
        total += Number(item.thanhTien);
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center py-2 border-b text-sm';
        div.innerHTML = `
          <div class="flex-1">
            <div class="font-medium">${item.matHang}</div>
            <div class="text-xs text-gray-500">SL: ${item.suDung} x ${Number(item.donGia).toLocaleString()}đ</div>
          </div>
          <div class="font-semibold text-right">${Number(item.thanhTien).toLocaleString()}đ</div>
        `;
        container.appendChild(div);
      });

      document.getElementById('totalAmount').innerText = total.toLocaleString() + ' đ';
      document.getElementById('btnPay').disabled = false;
    }

    // --- HÀNH ĐỘNG ---
    async function selectRoom(phong) {
      currentRoom = phong;
      document.getElementById('selectedRoomName').innerText = 'Phòng: ' + phong;
      renderRooms(); 
      
      const billRes = await callGAS('getRoomBill', { phong: phong });
      renderBill(billRes);
    }

    async function submitOrder(multiplier) {
      if (!currentRoom) { alert('Vui lòng chọn phòng trước!'); return; }
      if (!currentSelectedItem) { alert('Vui lòng chọn món từ menu trước! (Click vào tên món)'); return; }

      const qtyInput = document.getElementById('orderQty');
      const qty = Number(qtyInput.value) * multiplier;
      
      if (qty === 0) { alert('Số lượng không hợp lệ!'); return; }

      const res = await callGAS('addOrder', {
        phong: currentRoom,
        matHang: currentSelectedItem.tenHang,
        soLuong: qty,
        donGia: currentSelectedItem.gia
      });

      if (res.success) {
        alert(res.message);
        qtyInput.value = 1;
        currentSelectedItem = null;
        renderMenu(); // Bỏ highlight
        selectRoom(currentRoom); // Reload bill
      }
    }

    async function payCurrentRoom() {
      if (!currentRoom) return;
      if (!confirm(`Xác nhận thanh toán cho phòng ${currentRoom}?`)) return;

      const totalText = document.getElementById('totalAmount').innerText.replace(/[^0-9]/g, '');
      
      const res = await callGAS('payRoom', {
        phong: currentRoom,
        tongTien: Number(totalText)
      });

      if (res.success) {
        alert(res.message);
        currentRoom = null;
        currentSelectedItem = null;
        document.getElementById('selectedRoomName').innerText = 'Chưa chọn phòng';
        document.getElementById('billDetails').innerHTML = '<div class="text-center text-gray-500 py-4">Chọn phòng để xem bill</div>';
        document.getElementById('totalAmount').innerText = '0 đ';
        document.getElementById('btnPay').disabled = true;
        loadData(); // Reload tất cả để cập nhật trạng thái phòng
      }
    }

    // --- ĐỒNG BỘ NỀN TẢNG ---
    async function checkRoomStatusAuto() {
      document.getElementById('syncStatus').innerHTML = '<i class="fas fa-sync fa-spin mr-1"></i>Đang kiểm tra...';
      const res = await callGAS('checkStatus');
      if (res && res.success) {
        document.getElementById('syncStatus').innerHTML = '<i class="fas fa-check-circle text-green-500"></i>Đã đồng bộ (Auto)';
        if (res.message.includes('Đã đồng bộ')) {
          loadData(); 
          if (currentRoom) selectRoom(currentRoom); 
        }
      }
    }

    function manualSync() {
      checkRoomStatusAuto();
    }
  </script>
</body>
</html>
