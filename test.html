<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kiểm Kho</title>
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/400.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#eef2f7;padding-bottom:24px;}

/* HEADER */
.header{
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:#fff;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    position:sticky;top:0;z-index:100;
}
.header h2{font-size:17px;}
.header input{
    padding:8px;border-radius:10px;border:none;
    background:rgba(255,255,255,0.2);color:#fff;
}

/* CALENDAR */
.calendar{background:#fff;border-radius:14px;padding:10px;margin:10px;box-shadow:0 4px 15px rgba(0,0,0,0.08);}
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.calendar-header button{background:#667eea;border:none;color:#fff;border-radius:8px;padding:4px 10px;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.calendar-day{text-align:center;padding:8px 0;border-radius:8px;font-size:12px;cursor:pointer;}
.calendar-day.has-data{background:#1976d2;color:#fff;font-weight:600;}
.calendar-day.today{border:2px solid #667eea;}

/* TABLE */
.main{padding:0 10px;}
.card{background:#fff;border-radius:14px;margin-bottom:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;font-size:12px;text-align:center;border-bottom:1px solid #eee;}
td:first-child{text-align:left;}

.qty-input{width:100%;padding:6px;font-size:16px;text-align:center;}
.diff.pos{color:green;} .diff.neg{color:red;}

/* BUTTON */
.btn{width:calc(100% - 20px);margin:10px;padding:14px;background:#667eea;color:#fff;border:none;border-radius:12px;font-weight:700;}

.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;display:none;}
</style>
</head>

<body>

<div class="header">
    <h2>📦 Kiểm Kho</h2>
    <input type="date" id="checkDate">
</div>

<div id="calendar"></div>

<div class="main">
    <div class="card">
        <div id="tableWrapper">Đang tải...</div>
    </div>
</div>

<button class="btn" onclick="saveData()">💾 LƯU</button>

<div class="loading" id="loading">Đang lưu...</div>
<div class="toast" id="toast"></div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyFfyiJnc1G-Yb6qv3C0oqPQDLFccsgwwF2GmSyFCxvJUoTMAdpYFJDM2XF9N-cr_jf9A/exec';

let invItems=[], lastValues={}, checkedItems={};
let availableDates=[];
let currentMonth=new Date();

function getToday(){return new Date().toISOString().split('T')[0];}

function showToast(msg){
    const t=document.getElementById('toast');
    t.innerText=msg;t.style.display='block';
    setTimeout(()=>t.style.display='none',2000);
}

/* ===== LOAD DATE LIST ===== */
function loadAvailableDates(){
    fetch(API_URL,{method:'POST',body:JSON.stringify({action:'getDates'})})
    .then(r=>r.json())
    .then(d=>{
        if(d.success){
            availableDates=d.dates||[];
            renderCalendar();
        }
    });
}

/* ===== CALENDAR ===== */
function renderCalendar(){
    const y=currentMonth.getFullYear();
    const m=currentMonth.getMonth();

    const first=new Date(y,m,1).getDay();
    const days=new Date(y,m+1,0).getDate();

    let html=`<div class="calendar">
    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <b>${m+1}/${y}</b>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid">`;

    for(let i=0;i<first;i++) html+=`<div></div>`;

    for(let d=1;d<=days;d++){
        const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let cls="calendar-day";
        if(availableDates.includes(ds)) cls+=" has-data";
        if(ds===getToday()) cls+=" today";

        html+=`<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
    }

    html+=`</div></div>`;
    document.getElementById('calendar').innerHTML=html;
}

function changeMonth(s){
    currentMonth.setMonth(currentMonth.getMonth()+s);
    renderCalendar();
}

function selectDate(d){
    document.getElementById('checkDate').value=d;
    loadData(d);
}

/* ===== LOAD DATA ===== */
function loadData(date){
    document.getElementById('tableWrapper').innerHTML="Đang tải...";
    fetch(API_URL,{method:'POST',body:JSON.stringify({action:'load',date})})
    .then(r=>r.json())
    .then(data=>{
        if(!data.success){document.getElementById('tableWrapper').innerHTML="Lỗi";return;}

        invItems=data.headers||[];
        lastValues={};

        (data.revisions||[]).forEach(r=>{
            Object.entries(r.items).forEach(([k,v])=>{
                if(v!=="") lastValues[k]=Number(v);
            });
        });

        renderTable();
    });
}

/* ===== TABLE ===== */
function renderTable(){
    let html="<table><tr><th>Mặt hàng</th><th>Nhập</th><th>Tồn</th><th>Chênh</th></tr>";

    invItems.forEach(i=>{
        let v=lastValues[i]||0;
        html+=`<tr>
            <td>${i}</td>
            <td><input type="number" data-i="${i}" oninput="calc(this)"></td>
            <td>${v}</td>
            <td id="d-${i}">0</td>
        </tr>`;
    });

    html+="</table>";
    document.getElementById('tableWrapper').innerHTML=html;
}

function calc(el){
    let i=el.dataset.i;
    let m=Number(el.value||0);
    let s=lastValues[i]||0;
    let d=s-m;
    let e=document.getElementById("d-"+i);
    e.innerText=d;
    e.className="diff "+(d>0?"pos":d<0?"neg":"");
}

/* ===== SAVE ===== */
function saveData(){
    let data={};
    document.querySelectorAll('input[type=number]').forEach(i=>{
        if(i.value!=="") data[i.dataset.i]=i.value;
    });

    if(Object.keys(data).length===0){
        showToast("Chưa nhập");
        return;
    }

    document.getElementById('loading').style.display='flex';

    fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({action:'save',date:getToday(),items:data})
    })
    .then(r=>r.json())
    .then(res=>{
        document.getElementById('loading').style.display='none';
        if(res.success){
            showToast("Đã lưu");
            loadAvailableDates();
        }
    });
}

/* INIT */
function init(){
    let d=document.getElementById('checkDate');
    d.value=getToday();
    d.onchange=()=>loadData(d.value);

    loadAvailableDates();
    loadData(getToday());
}
init();

</script>

</body>
</html>
