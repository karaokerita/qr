<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kiểm Kho</title>
<link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/400.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#eef2f7;padding-bottom:24px;}

/* HEADER */
.header{
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:#fff;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    box-shadow:0 4px 15px rgba(102,126,234,0.35);
    position:sticky;top:0;z-index:100;
}
.header h2{font-size:17px;white-space:nowrap;}
.header-right{display:flex;align-items:center;gap:8px;}
.header input[type="date"]{
    padding:8px 12px;border-radius:10px;border:none;font-size:16px;
    background:rgba(255,255,255,0.2);color:#fff;backdrop-filter:blur(4px);
    font-family:'Inter',sans-serif;
}
.header input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer;}
.btn-cal{
    width:40px;height:40px;border-radius:10px;border:none;
    background:rgba(255,255,255,0.2);color:#fff;font-size:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);transition:background 0.2s;
}
.btn-cal:active{background:rgba(255,255,255,0.35);}

/* STATS BAR */
.stats-bar{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stat-card{
    flex:1;min-width:100px;background:#fff;border-radius:12px;padding:10px 12px;
    text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform 0.2s;
}
.stat-card:active{transform:scale(0.97);}
.stat-num{font-size:22px;font-weight:700;line-height:1.2;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}
.stat-total .stat-num{color:#667eea;}
.stat-checked .stat-num{color:#2e7d32;}
.stat-unchecked .stat-num{color:#e53935;}

/* MAIN */
.main{padding:0 10px;}
.card{
    background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.07);
    overflow:hidden;margin-bottom:14px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead{background:linear-gradient(180deg,#f7f9fc,#f0f3f8);position:sticky;top:0;z-index:10;}
th,td{padding:9px 6px;font-size:12.5px;text-align:center;border-bottom:1px solid #eee;}
th{font-weight:700;color:#555;font-size:11.5px;text-transform:uppercase;letter-spacing:0.3px;}
td{word-break:break-word;vertical-align:middle;}
td:first-child{text-align:left;padding-left:10px;font-weight:500;}

/* ROW STATES */
.row-unchecked{background:rgba(255,226,226,0.7) !important;animation:rowPulse 2s ease-in-out infinite;}
.row-unchecked td{border-bottom-color:#ffcdd2;}
.row-checked{background:#fff;}
@keyframes rowPulse{0%,100%{background:rgba(255,226,226,0.7);}50%{background:rgba(255,205,205,0.9);}}

/* BADGE */
.badge-unchecked{
    display:inline-block;background:#e53935;color:#fff;font-size:10px;padding:2px 6px;
    border-radius:20px;margin-left:4px;font-weight:600;animation:badgeBlink 1.5s ease-in-out infinite;
}
@keyframes badgeBlink{0%,100%{opacity:1;}50%{opacity:0.6;}}

/* INPUT */
.qty-input{
    width:100%;padding:8px 4px;font-size:16px;text-align:center;border-radius:8px;
    border:1.5px solid #e0e0e0;background:#fafafa;transition:all 0.2s;font-family:'Inter',sans-serif;
}
.qty-input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.15);background:#fff;outline:none;}
.qty-input.entered{border-color:#2e7d32;background:#e8f5e9;color:#2e7d32;font-weight:600;}

/* DIFF */
.diff{font-weight:700;font-size:13px;}
.diff.pos{color:#2e7d32;}
.diff.neg{color:#c62828;}
.diff.zero{color:#78909c;}

/* UNCHECKED LIST */
.unchecked-section{
    background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.07);
    margin:0 10px 14px;overflow:hidden;
}
.unchecked-header{
    background:linear-gradient(135deg,#e53935,#ef5350);color:#fff;padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;
}
.unchecked-header h3{font-size:14px;font-weight:600;}
.unchecked-count{background:rgba(255,255,255,0.3);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;}
.unchecked-list{max-height:0;overflow:hidden;transition:max-height 0.4s ease;}
.unchecked-list.open{max-height:1000px;}
.unchecked-item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #fce4ec;gap:10px;}
.unchecked-item:last-child{border-bottom:none;}
.unchecked-item:active{background:#fce4ec;}
.unchecked-icon{
    width:28px;height:28px;background:#ffcdd2;border-radius:50%;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;color:#e53935;font-size:14px;
}
.unchecked-name{font-size:13px;color:#333;flex:1;}
.section-hidden{display:none !important;}

/* BUTTON */
.btn{
    width:calc(100% - 20px);margin:0 10px 16px;padding:14px;font-size:16px;
    background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;
    cursor:pointer;font-weight:700;font-family:'Inter',sans-serif;
    box-shadow:0 4px 15px rgba(102,126,234,0.35);transition:transform 0.15s,box-shadow 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:scale(0.98);box-shadow:0 2px 8px rgba(102,126,234,0.3);}

/* LOADING */
.loading{
    position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);
    display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);
}
.loading-box{
    background:#fff;padding:24px 36px;border-radius:16px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.15);animation:popIn 0.3s ease;
}
@keyframes popIn{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.spinner{
    width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#667eea;
    border-radius:50%;animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
    background:#333;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;
    font-weight:600;z-index:1000;transition:transform 0.3s ease;white-space:nowrap;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:linear-gradient(135deg,#43a047,#66bb6a);}
.toast.error{background:linear-gradient(135deg,#e53935,#ef5350);}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:#999;}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:14px;}

/* CALENDAR OVERLAY */
.cal-overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.5);z-index:200;display:none;
    align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);
}
.cal-overlay.open{display:flex;}
.cal-panel{
    background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;
    max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease;
    box-shadow:0 -10px 40px rgba(0,0,0,0.2);
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.cal-top{
    background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
    padding:18px 20px 14px;border-radius:20px 20px 0 0;
    display:flex;align-items:center;justify-content:space-between;
}
.cal-top h3{font-size:18px;font-weight:700;}
.cal-close{
    width:36px;height:36px;border-radius:50%;border:none;
    background:rgba(255,255,255,0.2);color:#fff;font-size:20px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background 0.2s;
}
.cal-close:active{background:rgba(255,255,255,0.4);}
.cal-nav{
    display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;
}
.cal-nav-btn{
    width:38px;height:38px;border-radius:10px;border:none;
    background:#f0f3f8;color:#555;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background 0.2s;
}
.cal-nav-btn:active{background:#e0e3e8;}
.cal-month-label{font-size:16px;font-weight:700;color:#333;}
.cal-grid{padding:8px 12px 16px;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.cal-weekdays span{
    text-align:center;font-size:11px;font-weight:600;color:#888;padding:6px 0;text-transform:uppercase;
}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{
    aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:12px;font-size:14px;font-weight:500;color:#333;cursor:pointer;
    position:relative;transition:all 0.15s;min-height:36px;
}
.cal-day:active{transform:scale(0.92);}
.cal-day.other-month{color:#ccc;}
.cal-day.today{background:#f0f3f8;font-weight:700;}
.cal-day.selected{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;}
.cal-day.has-data{background:#1e88e5;color:#fff;font-weight:600;}
.cal-day.selected.has-data{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;font-weight:700;}
.cal-day.today.has-data{background:#1e88e5;color:#fff;}
.cal-day.today.selected.has-data{background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;}
.cal-day.empty{pointer-events:none;}
.cal-legend{display:flex;gap:16px;justify-content:center;padding:0 16px 18px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.legend-dot.blue{background:#1e88e5;}
.legend-dot.purple{background:linear-gradient(135deg,#667eea,#764ba2);}
</style>
</head>
<body>

<div class="header">
    <h2>📦 Kiểm Kho</h2>
    <div class="header-right">
        <input type="date" id="checkDate">
        <button class="btn-cal" onclick="openCal()" title="Lịch kiểm kho">📅</button>
    </div>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat-card stat-total"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Tổng mặt hàng</div></div>
    <div class="stat-card stat-checked"><div class="stat-num" id="statChecked">0</div><div class="stat-label">Đã kiểm</div></div>
    <div class="stat-card stat-unchecked"><div class="stat-num" id="statUnchecked">0</div><div class="stat-label">Chưa kiểm</div></div>
</div>

<div class="main">
    <div class="card"><div id="tableWrapper"><div class="empty-state"><div class="icon">⏳</div><p>Đang tải dữ liệu...</p></div></div></div>
</div>

<div class="unchecked-section section-hidden" id="uncheckedSection">
    <div class="unchecked-header" onclick="toggleUncheckedList()">
        <h3>⚠️ Danh sách chưa kiểm</h3>
        <span class="unchecked-count" id="uncheckedCount">0</span>
    </div>
    <div class="unchecked-list" id="uncheckedList"></div>
</div>

<button class="btn" type="button" onclick="saveData()"><span>💾</span><span>LƯU DỮ LIỆU</span></button>

<div class="loading" id="loading"><div class="loading-box"><div class="spinner"></div><div>Đang lưu dữ liệu...</div></div></div>
<div class="toast" id="toast"></div>

<!-- CALENDAR OVERLAY -->
<div class="cal-overlay" id="calOverlay" onclick="closeCalOutside(event)">
    <div class="cal-panel">
        <div class="cal-top">
            <h3>📅 Lịch kiểm kho</h3>
            <button class="cal-close" onclick="closeCal()">✕</button>
        </div>
        <div class="cal-nav">
            <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
            <span class="cal-month-label" id="calMonthLabel"></span>
            <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="cal-grid">
            <div class="cal-weekdays">
                <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span>CN</span>
            </div>
            <div class="cal-days" id="calDays"></div>
        </div>
        <div class="cal-legend">
            <div class="legend-item"><div class="legend-dot blue"></div>Ngày đã kiểm kho</div>
            <div class="legend-item"><div class="legend-dot purple"></div>Ngày đang chọn</div>
        </div>
    </div>
</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyRDLS7QwkbRCvzKFPHEMF6Nw_fBpfo_nArXwHFZoQoOUeh57NSwuZ8Wb8NGGyMhsrIaA/exec';
let invItems=[];
let lastValues={};
let checkedItems={};
let calDates={};
let calVYear,calVMonth;

function getNowVN(){const n=new Date();return new Date(n.getTime()-n.getTimezoneOffset()*60000);}
function getTodayVN(){return getNowVN().toISOString().split('T')[0];}
function getTimeVN(){return getNowVN().toLocaleTimeString('vi-VN',{hour12:false});}

function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t;setTimeout(()=>e.classList.add('show'),10);setTimeout(()=>e.classList.remove('show'),2500);}
function toggleUncheckedList(){document.getElementById('uncheckedList').classList.toggle('open');}

function updateStats(){
    const total=invItems.length;
    const checkedCount=Object.keys(checkedItems).filter(k=>invItems.includes(k)).length;
    const uncheckedCount=total-checkedCount;
    document.getElementById('statTotal').textContent=total;
    document.getElementById('statChecked').textContent=checkedCount;
    document.getElementById('statUnchecked').textContent=uncheckedCount;
    document.getElementById('uncheckedCount').textContent=uncheckedCount+' mục';
    const sec=document.getElementById('uncheckedSection');
    if(checkedCount>0&&uncheckedCount>0)sec.classList.remove('section-hidden');
    else sec.classList.add('section-hidden');
}

function renderUncheckedList(){
    const list=document.getElementById('uncheckedList');
    let html='';
    invItems.forEach(i=>{if(!checkedItems[i])html+=`<div class="unchecked-item"><div class="unchecked-icon">✕</div><div class="unchecked-name">${i}</div></div>`;});
    list.innerHTML=html;
}

function highlightRows(){
    const hasChecked=Object.keys(checkedItems).length>0;
    document.querySelectorAll('tbody tr').forEach(row=>{
        const input=row.children[1].querySelector('input');
        const itemName=input?input.dataset.item:'';
        row.classList.remove('row-checked','row-unchecked');
        const td=row.children[0];
        const exist=td.querySelector('.badge-unchecked');
        if(exist)exist.remove();
        if(hasChecked&&!checkedItems[itemName]){
            row.classList.add('row-unchecked');
            const b=document.createElement('span');b.className='badge-unchecked';b.textContent='CHƯA KIỂM';td.appendChild(b);
        }
    });
}

function init(){
    const today=getTodayVN();const d=document.getElementById('checkDate');d.value=today;
    d.addEventListener('change',function(){checkedItems={};loadData(this.value);});
    /* Tự động kiểm tra & đánh dấu lịch mỗi lần load trang */
    initCal();
    loadData(today);
}

function loadData(date){
    document.getElementById('tableWrapper').innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Đang tải dữ liệu...</p></div>';
    fetch(API_URL,{method:'POST',body:JSON.stringify({action:'load',date:date})})
    .then(r=>r.json()).then(data=>{
        if(!data.success){document.getElementById('tableWrapper').innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Lỗi API</p></div>';return;}
        invItems=data.headers||[];let rev=data.revisions||[];
        lastValues={};checkedItems={};
        if(rev&&rev.length>0){
            const hasData=rev.some(r=>Object.keys(r.items||{}).length>0);
            if(hasData){calDates[date]=true;renderCal();}
        }
        rev.forEach(r=>Object.keys(r.items).forEach(k=>{let v=r.items[k];if(v!==""&&v!==null&&v!==undefined){lastValues[k]=Number(v);checkedItems[k]=true;}}));
        renderTable();
    }).catch(()=>document.getElementById('tableWrapper').innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Lỗi kết nối API</p></div>');
}

function renderTable(){
    if(invItems.length===0){document.getElementById('tableWrapper').innerHTML='<div class="empty-state"><div class="icon">⚠️</div><p>Không có dữ liệu</p></div>';updateStats();return;}
    let h='<table><thead><tr><th style="width:28%">Mặt hàng</th><th style="width:16%">SL kiểm</th><th style="width:18%">Tồn theo ngày</th><th style="width:18%">Tồn trên máy</th><th style="width:20%">Thừa / Thiếu</th></tr></thead><tbody>';
    invItems.forEach(item=>{
        let sys=lastValues[item]||0;
        let isOk=checkedItems[item]===true;
        let cls=isOk?'row-checked':'row-unchecked';
        let badge=(!isOk&&Object.keys(checkedItems).length>0)?'<span class="badge-unchecked">CHƯA KIỂM</span>':'';
        h+=`<tr class="${cls}"><td>${item} ${badge}</td><td><input type="number" class="qty-input${isOk?' entered':''}" data-item="${escapeAttr(item)}" value="${isOk?lastValues[item]:''}" oninput="onQtyInput(this)"></td><td id="val-${escapeId(item)}">${sys}</td><td><input type="number" class="qty-input" data-item="${escapeAttr(item)}" oninput="calcDiff(this)"></td><td id="diff-${escapeId(item)}" class="diff zero">${isOk?(sys-lastValues[item]):0}</td></tr>`;
    });
    document.getElementById('tableWrapper').innerHTML=h+'</tbody></table>';
    updateStats();renderUncheckedList();
}

function onQtyInput(inp){
    const item=inp.dataset.item;
    if(inp.value!==''&&!isNaN(Number(inp.value))){checkedItems[item]=true;inp.classList.add('entered');}
    else{delete checkedItems[item];inp.classList.remove('entered');}
    highlightRows();updateStats();renderUncheckedList();calcDiff(inp);
}

function calcDiff(inp){
    const item=inp.dataset.item;const m=Number(inp.value||0);const s=Number(lastValues[item]||0);
    const d=s-m;const el=document.getElementById("diff-"+escapeId(item));if(!el)return;
    el.innerText=d;el.classList.remove("pos","neg","zero");
    if(d>0)el.classList.add("pos");else if(d<0)el.classList.add("neg");else el.classList.add("zero");
}

function saveData(){
    let entries={};
    document.querySelectorAll('tbody tr').forEach(row=>{
        let inp=row.children[1].querySelector('input');
        if(inp&&inp.value!=='')entries[inp.dataset.item]=inp.value;
    });
    if(Object.keys(entries).length===0){showToast("⚠️ Chưa nhập mặt hàng nào","error");return;}
    document.getElementById('loading').style.display='flex';
    const curDate=getTodayVN();
    fetch(API_URL,{method:'POST',body:JSON.stringify({action:'save',date:curDate,time:getTimeVN(),items:entries})})
    .then(r=>r.json()).then(data=>{
        document.getElementById('loading').style.display='none';
        if(!data.success){showToast("❌ Lỗi ghi dữ liệu","error");return;}
        calDates[curDate]=true;
        renderCal();
        Object.keys(entries).forEach(i=>{lastValues[i]=Number(entries[i]);checkedItems[i]=true;let el=document.getElementById("val-"+escapeId(i));if(el)el.innerText=entries[i];});
        document.querySelectorAll('tbody tr').forEach(r=>{r.children[1].querySelector('input').value='';});
        document.querySelectorAll('.qty-input.entered').forEach(i=>i.classList.remove('entered'));
        highlightRows();updateStats();renderUncheckedList();
        showToast("✅ Đã ghi thành công!","success");
    }).catch(()=>{document.getElementById('loading').style.display='none';showToast("❌ Lỗi kết nối","error");});
}

/* ==================== CALENDAR ==================== */
function initCal(){
    const now=getNowVN();
    calVYear=now.getFullYear();
    calVMonth=now.getMonth();
    calDates={};
    /* Tự động tải danh sách ngày có kiểm kho từ API mỗi lần load trang */
    loadCalDates();
    renderCal();
}

function loadCalDates(){
    fetch(API_URL,{method:'POST',body:JSON.stringify({action:'getDates'})})
    .then(r=>r.json()).then(data=>{
        if(data.success&&data.dates&&Array.isArray(data.dates)){
            calDates={};
            data.dates.forEach(ds=>{if(ds)calDates[ds]=true;});
            renderCal();
        }
    }).catch(()=>{});
}

function openCal(){
    document.getElementById('calOverlay').classList.add('open');
    renderCal();
}

function closeCal(){
    document.getElementById('calOverlay').classList.remove('open');
}

function closeCalOutside(e){
    if(e.target===document.getElementById('calOverlay'))closeCal();
}

function changeMonth(dir){
    calVMonth+=dir;
    if(calVMonth>11){calVMonth=0;calVYear++;}
    if(calVMonth<0){calVMonth=11;calVYear--;}
    renderCal();
}

function pickDate(ds){
    closeCal();
    document.getElementById('checkDate').value=ds;
    checkedItems={};
    loadData(ds);
}

function renderCal(){
    const monthsVN=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
    document.getElementById('calMonthLabel').textContent=monthsVN[calVMonth]+' '+calVYear;

    const container=document.getElementById('calDays');
    const today=getTodayVN();
    const selected=document.getElementById('checkDate').value;

    const firstDay=new Date(calVYear,calVMonth,1);
    let startDow=firstDay.getDay();
    startDow=startDow===0?6:startDow-1;

    const daysInMonth=new Date(calVYear,calVMonth+1,0).getDate();
    const daysInPrevMonth=new Date(calVYear,calVMonth,0).getDate();

    let html='';
    const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;

    for(let i=0;i<totalCells;i++){
        let dayNum,ds,cls='cal-day';
        if(i<startDow){
            const prevDay=daysInPrevMonth-startDow+i+1;
            dayNum=prevDay;
            const pm=calVMonth===0?11:calVMonth-1;
            const py=calVMonth===0?calVYear-1:calVYear;
            ds=py+'-'+String(pm+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
            cls+=' other-month';
        } else if(i>=startDow+daysInMonth){
            dayNum=i-startDow-daysInMonth+1;
            const nm=calVMonth===11?0:calVMonth+1;
            const ny=calVMonth===11?calVYear+1:calVYear;
            ds=ny+'-'+String(nm+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
            cls+=' other-month';
        } else {
            dayNum=i-startDow+1;
            ds=calVYear+'-'+String(calVMonth+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
        }

        if(ds===today)cls+=' today';
        if(ds===selected)cls+=' selected';
        if(calDates[ds])cls+=' has-data';

        html+=`<div class="${cls}" onclick="pickDate('${ds}')">${dayNum}</div>`;
    }
    container.innerHTML=html;
}

function escapeId(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function escapeAttr(s){return s.replace(/"/g,'&quot;');}

init();
</script>
