<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KARAOKE RITA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/audiowide@5.0.0/index.css">
  <style>
    :root{
      --bg1:#0a0420;
      --bg2:#1a0b3d;
      --bg3:#2d0a4a;
      --card:rgba(255,255,255,0.04);
      --card-border:rgba(255,255,255,0.08);
      --accent:#ff2d95;
      --accent2:#a855f7;
      --accent3:#06b6d4;
      --muted:#94a3b8;
      --text:#f1f5f9;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif}
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:20px;
      background:
        radial-gradient(ellipse at top left, rgba(168,85,247,0.25), transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(255,45,149,0.2), transparent 50%),
        radial-gradient(ellipse at center, rgba(6,182,212,0.1), transparent 70%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      color:var(--text);
      overflow-x:hidden;
    }
    /* Animated background orbs */
    body::before, body::after{
      content:'';
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.4;
      z-index:0;
      pointer-events:none;
      animation:float 12s ease-in-out infinite;
    }
    body::before{
      width:400px;height:400px;
      background:radial-gradient(circle, #ff2d95, transparent 70%);
      top:-100px;left:-100px;
    }
    body::after{
      width:500px;height:500px;
      background:radial-gradient(circle, #a855f7, transparent 70%);
      bottom:-150px;right:-150px;
      animation-delay:-6s;
    }
    @keyframes float{
      0%,100%{transform:translate(0,0) scale(1)}
      50%{transform:translate(40px,-30px) scale(1.1)}
    }

    .wrap{
      position:relative;
      z-index:1;
      width:min(640px,100%);
      background:linear-gradient(145deg, rgba(20,10,40,0.85), rgba(10,5,30,0.9));
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid var(--card-border);
      border-radius:28px;
      padding:36px 32px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(168,85,247,0.15),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Header */
    .header{
      text-align:center;
      margin-bottom:28px;
      padding-bottom:24px;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .logo-icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:64px;height:64px;
      border-radius:20px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 10px 30px rgba(255,45,149,0.4);
      margin-bottom:14px;
      font-size:32px;
    }
    h1{
      margin:0;
      font-family:'Audiowide', Inter, sans-serif;
      font-size:36px;
      letter-spacing:3px;
      background:linear-gradient(90deg, #ff2d95, #a855f7, #06b6d4, #ff2d95);
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:shine 6s linear infinite;
    }
    @keyframes shine{
      0%{background-position:0% 50%}
      100%{background-position:300% 50%}
    }
    .subtitle{
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    /* Result card - ở trên */
    .result{
      position:relative;
      margin-bottom:28px;
      padding:32px 24px;
      border-radius:22px;
      background:
        linear-gradient(135deg, rgba(168,85,247,0.15), rgba(255,45,149,0.08));
      border:1px solid rgba(168,85,247,0.25);
      text-align:center;
      overflow:hidden;
      transition:all 0.4s ease;
    }
    .result::before{
      content:'';
      position:absolute;
      inset:0;
      background:radial-gradient(circle at top, rgba(255,45,149,0.2), transparent 60%);
      pointer-events:none;
    }
    .result-label{
      position:relative;
      color:var(--muted);
      font-size:13px;
      letter-spacing:2px;
      text-transform:uppercase;
      margin-bottom:12px;
    }
    .result-time{
      position:relative;
      font-family:'Audiowide', Inter, sans-serif;
      font-size:88px;
      font-weight:700;
      line-height:1;
      background:linear-gradient(180deg, #ffffff 0%, #ff2d95 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 60px rgba(255,45,149,0.5);
      letter-spacing:4px;
      transition:transform 0.3s ease;
    }
    .result-time.pop{
      animation:pop 0.4s ease;
    }
    @keyframes pop{
      0%{transform:scale(1)}
      50%{transform:scale(1.08)}
      100%{transform:scale(1)}
    }
    .result-date{
      position:relative;
      margin-top:8px;
      color:var(--accent3);
      font-size:14px;
      font-weight:500;
      letter-spacing:1px;
    }
    .detail{
      position:relative;
      margin-top:16px;
      padding-top:16px;
      border-top:1px dashed rgba(255,255,255,0.1);
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      min-height:20px;
    }
    .detail strong{
      color:var(--accent);
      font-weight:600;
    }

    /* Time picker - ở dưới, rõ ràng */
    .picker-section{
      padding:24px;
      border-radius:20px;
      background:rgba(255,255,255,0.03);
      border:1px solid var(--card-border);
    }
    .picker-label{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:var(--text);
      font-size:16px;
      font-weight:600;
      letter-spacing:0.5px;
      margin-bottom:16px;
    }
    .picker-label .dot{
      width:8px;height:8px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 12px var(--accent);
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:0.6;transform:scale(1.3)}
    }
    .time-input-wrap{
      position:relative;
      max-width:280px;
      margin:0 auto;
    }
    input[type=time]{
      width:100%;
      background:linear-gradient(145deg, rgba(10,5,30,0.9), rgba(30,15,60,0.9));
      border:2px solid rgba(168,85,247,0.3);
      padding:18px 20px;
      border-radius:16px;
      color:var(--text);
      font-family:'Audiowide', Inter, sans-serif;
      font-size:32px;
      text-align:center;
      letter-spacing:4px;
      outline:none;
      transition:all 0.3s ease;
      color-scheme:dark;
    }
    input[type=time]:hover{
      border-color:rgba(168,85,247,0.5);
    }
    input[type=time]:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(255,45,149,0.15), 0 10px 30px rgba(255,45,149,0.2);
    }

    /* Footer */
    footer{
      margin-top:24px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
      letter-spacing:2px;
      text-transform:uppercase;
      padding-top:20px;
      border-top:1px solid rgba(255,255,255,0.05);
    }
    footer .emoji{
      display:inline-block;
      margin-right:6px;
      animation:wave 2s ease-in-out infinite;
    }
    @keyframes wave{
      0%,100%{transform:rotate(0)}
      25%{transform:rotate(-10deg)}
      75%{transform:rotate(10deg)}
    }

    @media (max-width:480px){
      .wrap{padding:24px 18px}
      h1{font-size:28px;letter-spacing:2px}
      .result-time{font-size:64px}
      input[type=time]{font-size:26px;padding:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="logo-icon">🎤</div>
      <h1>KARAOKE RITA</h1>
      <div class="subtitle">Hệ thống tính giờ vào làm</div>
    </div>

    <!-- Kết quả hiển thị ở trên -->
    <div class="result" id="result">
      <div class="result-label">⏰ Giờ vào làm ngày hôm sau</div>
      <div class="result-time" id="start">--:--</div>
      <div class="result-date" id="dateLabel">Ngày mai</div>
      <div class="detail" id="detail">Vui lòng chọn giờ về ở bên dưới để xem kết quả.</div>
    </div>

    <!-- Chọn giờ ở dưới, rõ ràng -->
    <div class="picker-section">
      <div class="picker-label">
        <span class="dot"></span>
        <span>CHỌN GIỜ VỀ</span>
        <span class="dot"></span>
      </div>
      <div class="time-input-wrap">
        <input id="leave" type="time" step="60" value="00:00">
      </div>
    </div>

    <footer>
      <span class="emoji">🎵</span> Ghi chú: ĐI LÀM ĐÚNG GIỜ
    </footer>
  </div>

  <script>
    const leave = document.getElementById('leave');
    const startEl = document.getElementById('start');
    const detail = document.getElementById('detail');
    const dateLabel = document.getElementById('dateLabel');

    function pad(n){return String(n).padStart(2,'0')}

    function computeStart(leaveTime){
      if(!leaveTime) return {startMinutes: null, extra:0};
      const [hh, mm] = leaveTime.split(':').map(x=>parseInt(x,10));
      const leaveMinutes = hh*60 + mm;
      const threshold = 0*60 + 0; // 00:00
      const standardStart = 11*60; // 11:00
      if(leaveMinutes <= threshold){
        return {startMinutes: standardStart, extra: 0};
      } else {
        const extra = leaveMinutes - threshold;
        return {startMinutes: standardStart + extra, extra};
      }
    }

    function render(){
      const val = leave.value;
      const res = computeStart(val);
      
      // Pop animation
      startEl.classList.remove('pop');
      void startEl.offsetWidth;
      startEl.classList.add('pop');

      if(!val){ 
        startEl.textContent = '--:--'; 
        detail.innerHTML = 'Vui lòng chọn giờ về.';
        dateLabel.textContent = 'Ngày mai';
        return; 
      }
      const sm = res.startMinutes;
      const h = Math.floor(sm / 60) % 24;
      const m = sm % 60;
      startEl.textContent = pad(h) + ':' + pad(m);
      
      // Tomorrow's date
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const days = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
      dateLabel.textContent = days[tomorrow.getDay()] + ' — ' + pad(tomorrow.getDate()) + '/' + pad(tomorrow.getMonth()+1);

      if(res.extra === 0){
        detail.innerHTML = '✅ Giờ về <strong>' + val + '</strong> đúng tiêu chuẩn → Vào làm lúc <strong>11:00</strong>';
      } else {
        detail.innerHTML = 'Giờ về <strong>' + val + '</strong> → Muộn <strong>' + res.extra + ' phút</strong> so với 00:00 → Giờ vào làm: <strong>' + pad(h) + ':' + pad(m) + '</strong> (11:00 + ' + res.extra + ' phút).';
      }
    }

    leave.addEventListener('change', render);
    leave.addEventListener('input', render);

    render();
  </script>
</body>
</html>
